<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="js/theme.js?v=1"></script>
    <style>html{background-color:#1e293b;}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成员映射 - CodeGuard</title>
        <script src="js/auth.js?v=5"></script>
    <script src="js/menu-config.js?v=2"></script>
    <script src="js/sidebar.js?v=2"></script>
    <link rel="stylesheet" href="/static/fontawesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css?v=1">
    <style>
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #3b82f6; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
<div id="page-transition" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#1e293b;z-index:99999;transition:opacity .25s ease;"></div>
<script>
(function(){
  function hide(){var el=document.getElementById('page-transition');if(el){el.style.opacity='0';setTimeout(function(){el.remove();},250);}}
  if(document.readyState==='complete'){hide();}else{window.addEventListener('load',hide);}
})();
</script>
<div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
        <nav style="padding: 20px; text-align: center; color: var(--cg-text-tertiary); font-size: 13px;">加载中...</nav>
    </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white border-b px-8 py-4 flex items-center justify-between sticky top-0 z-10">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">成员映射</h2>
                    <p class="text-sm text-gray-500 mt-1">管理 Git 用户名与 IM 用户 ID 之间的映射关系</p>
                </div>
            </header>

            <div class="px-8 py-6 space-y-6">
                <!-- 搜索 + 操作 -->
                <div class="flex items-center gap-4">
                    <div class="bg-white rounded-xl border px-6 py-4 flex items-center gap-4 flex-1">
                        <i class="fas fa-search text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="搜索 Git 用户名..." 
                               class="flex-1 outline-none text-sm" onkeypress="if(event.key==='Enter')loadMappings()">
                        <button onclick="loadMappings()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
                            搜索
                        </button>
                    </div>
                    <button data-admin-only onclick="openCreateModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700 flex items-center gap-2 whitespace-nowrap">
                        <i class="fas fa-plus"></i>新增映射
                    </button>
                </div>

                <!-- 列表 -->
                <div class="bg-white rounded-xl border overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">Git 用户名</th>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">IM 平台</th>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">IM 用户 ID</th>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">展示名</th>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">创建时间</th>
                                <th class="px-6 py-3 text-left text-gray-600 font-medium">更新时间</th>
                                <th class="px-6 py-3 text-center text-gray-600 font-medium">操作</th>
                            </tr>
                        </thead>
                        <tbody id="mappingTableBody" class="divide-y"></tbody>
                    </table>
                    <div class="px-6 py-4 flex items-center justify-between border-t">
                        <span id="totalCount" class="text-sm text-gray-500">共 0 条记录</span>
                        <div class="flex items-center gap-4">
                            <select id="pageSizeSelect" onchange="changePageSize()" class="px-2 py-1 border rounded text-sm">
                                <option value="10" selected>10条/页</option>
                                <option value="20">20条/页</option>
                                <option value="50">50条/页</option>
                            </select>
                            <div id="pagination" class="flex gap-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div id="mappingModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl w-[500px] flex flex-col" style="max-height: 85vh;">
            <div class="px-6 py-4 border-b flex items-center justify-between flex-shrink-0">
                <h3 class="font-bold text-lg" id="modalTitle">新增映射</h3>
                <button onclick="closeModal('mappingModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto flex-1">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Git 用户名 <span class="text-red-500">*</span></label>
                    <select id="gitUsername" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">选择 Git 用户名</option>
                    </select>
                    <input type="text" id="gitUsernameInput" placeholder="或手动输入" 
                           class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mt-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">IM 平台 <span class="text-red-500">*</span></label>
                    <select id="imPlatform" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" disabled>
                        <option value="wecom">企业微信</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">IM 用户 ID <span class="text-red-500">*</span></label>
                    <input type="text" id="imUserId" placeholder="例如：ZhangSan" 
                           class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <p class="text-xs text-gray-500 mt-1">企业微信中的 UserID，用于 @ 通知</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">展示名</label>
                    <input type="text" id="displayName" placeholder="例如：张三" 
                           class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="px-6 py-4 border-t flex justify-end gap-3 flex-shrink-0">
                <button onclick="closeModal('mappingModal')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">取消</button>
                <button onclick="saveMapping()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-[400px]">
            <h3 class="font-bold text-lg mb-2">确认删除</h3>
            <p class="text-gray-600 text-sm">确定要删除此映射吗？删除后该 Git 用户将无法收到定向通知。</p>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal('deleteModal')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">取消</button>
                <button onclick="confirmDelete()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">删除</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentPage = 1;
        let pageSize = 10;
        let editingId = null;
        let deleteId = null;
        let gitUsers = [];

        function toggleUserMenu() {
            document.getElementById('userMenu').classList.toggle('hidden');
        }
        
        function toggleNotifyMenu() {
            const menu = document.getElementById('notifyMenu');
            const icon = document.getElementById('notifyMenuIcon');
            menu.classList.toggle('hidden');
            icon.style.transform = menu.classList.contains('hidden') ? '' : 'rotate(180deg)';
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showModal(id) { document.getElementById(id).classList.add('active'); }

        async function loadGitUsers() {
            try {
                const res = await apiFetch(`${API_BASE}/member-mappings/git-users`);
                const data = await res.json();
                gitUsers = data.data || [];
                const select = document.getElementById('gitUsername');
                select.innerHTML = '<option value="">选择 Git 用户名</option>';
                gitUsers.forEach(u => {
                    select.innerHTML += `<option value="${u}">${u}</option>`;
                });
            } catch (e) {
                console.error('加载 Git 用户失败:', e);
            }
        }

        async function loadMappings() {
            try {
                const search = document.getElementById('searchInput').value;
                const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
                if (search) params.append('git_username', search);
                
                const res = await apiFetch(`${API_BASE}/member-mappings?${params}`);
                const data = await res.json();
                
                renderTable(data.data || []);
                renderPagination(data.total || 0);
            } catch (e) {
                console.error('加载映射失败:', e);
                document.getElementById('mappingTableBody').innerHTML = 
                    '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">加载失败</td></tr>';
            }
        }

        function renderTable(mappings) {
            const tbody = document.getElementById('mappingTableBody');
            if (mappings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = mappings.map(m => {
                const platformBadge = m.im_platform === 'wecom' 
                    ? '<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-xs">企业微信</span>' 
                    : `<span class="bg-gray-50 text-gray-600 px-2 py-0.5 rounded text-xs">${m.im_platform}</span>`;
                
                return `<tr class="hover:bg-gray-50">
                    <td class="px-6 py-3 font-mono text-sm text-gray-800">${m.git_username}</td>
                    <td class="px-6 py-3">${platformBadge}</td>
                    <td class="px-6 py-3 font-mono text-sm text-gray-700">${m.im_user_id}</td>
                    <td class="px-6 py-3 text-gray-700">${m.display_name || '-'}</td>
                    <td class="px-6 py-3 text-gray-500 text-xs">${formatDate(m.created_at)}</td>
                    <td class="px-6 py-3 text-gray-500 text-xs">${formatDate(m.updated_at)}</td>
                    <td class="px-6 py-3 text-center space-x-2">
                        <button onclick="openEditModal(${m.id})" class="text-blue-600 hover:text-blue-700 text-sm">编辑</button>
                        <button onclick="openDeleteModal(${m.id})" class="text-red-500 hover:text-red-600 text-sm">删除</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderPagination(total) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;

            const totalText = document.getElementById('totalCount');
            if (totalText) totalText.textContent = `共 ${total} 条记录`;

            const totalPages = Math.ceil(total / pageSize) || 1;
            const page = currentPage;
            const pages = totalPages;
            if (pages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            // 上一页
            html += `<button class="px-3 py-1 border rounded text-sm ${page <= 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">上一页</button>`;

            // 首页
            if (page > 3) {
                html += `<button class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50" onclick="goPage(1)">1</button>`;
                if (page > 4) {
                    html += `<span class="px-2 py-1 text-gray-400">...</span>`;
                }
            }

            // 中间页码（以当前页为中心，最多5个）
            let start = Math.max(1, page - 2);
            let end = Math.min(pages, page + 2);
            if (end - start < 4) {
                if (start === 1) {
                    end = Math.min(pages, start + 4);
                } else if (end === pages) {
                    start = Math.max(1, end - 4);
                }
            }
            for (let i = start; i <= end; i++) {
                html += `<button class="px-3 py-1 border rounded text-sm ${i === page ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50'}" onclick="goPage(${i})">${i}</button>`;
            }

            // 尾页
            if (page < pages - 2) {
                if (page < pages - 3) {
                    html += `<span class="px-2 py-1 text-gray-400">...</span>`;
                }
                html += `<button class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50" onclick="goPage(${pages})">${pages}</button>`;
            }

            // 下一页
            html += `<button class="px-3 py-1 border rounded text-sm ${page >= pages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page >= pages ? 'disabled' : ''} onclick="goPage(${page + 1})">下一页</button>`;

            pagination.innerHTML = html;
        }

        function goPage(page) {
            const totalPages = Math.ceil(document.getElementById('totalCount').textContent.match(/\d+/) / pageSize) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadMappings();
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value) || 20;
            currentPage = 1;
            loadMappings();
        }

        function openCreateModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增映射';
            document.getElementById('gitUsername').value = '';
            document.getElementById('gitUsernameInput').value = '';
            document.getElementById('gitUsername').disabled = false;
            document.getElementById('gitUsernameInput').disabled = false;
            document.getElementById('imUserId').value = '';
            document.getElementById('displayName').value = '';
            showModal('mappingModal');
            loadGitUsers();
        }

        async function openEditModal(id) {
            try {
                const res = await apiFetch(`${API_BASE}/member-mappings/${id}`);
                const data = await res.json();
                const m = data.data;
                
                editingId = id;
                document.getElementById('modalTitle').textContent = '编辑映射';
                document.getElementById('gitUsername').value = m.git_username;
                document.getElementById('gitUsername').disabled = true;
                document.getElementById('gitUsernameInput').value = m.git_username;
                document.getElementById('gitUsernameInput').disabled = true;
                document.getElementById('imUserId').value = m.im_user_id;
                document.getElementById('displayName').value = m.display_name || '';
                showModal('mappingModal');
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        async function saveMapping() {
            const gitUsername = document.getElementById('gitUsername').value || document.getElementById('gitUsernameInput').value;
            const imUserId = document.getElementById('imUserId').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            
            if (!gitUsername) { alert('请输入 Git 用户名'); return; }
            if (!imUserId) { alert('请输入 IM 用户 ID'); return; }
            
            const data = {
                git_username: gitUsername,
                im_platform: 'wecom',
                im_user_id: imUserId,
                display_name: displayName
            };
            
            try {
                const url = editingId 
                    ? `${API_BASE}/member-mappings/${editingId}` 
                    : `${API_BASE}/member-mappings`;
                const method = editingId ? 'PUT' : 'POST';
                
                const res = await apiFetch(url, { method, body: JSON.stringify(data) });
                if (res.ok) {
                    closeModal('mappingModal');
                    loadMappings();
                    showToast(editingId ? '更新成功' : '创建成功', 'success');
                } else {
                    const err = await res.json();
                    alert(err.error || '保存失败');
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        function openDeleteModal(id) {
            deleteId = id;
            showModal('deleteModal');
        }

        async function confirmDelete() {
            if (!deleteId) return;
            try {
                const res = await apiFetch(`${API_BASE}/member-mappings/${deleteId}`, { method: 'DELETE' });
                if (res.ok) {
                    closeModal('deleteModal');
                    loadMappings();
                    showToast('删除成功', 'success');
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
            deleteId = null;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function showToast(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 ${colors[type] || colors.info} text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // 初始化
        loadMappings();
        renderSidebar('mappings');
    </script>
    <script defer src="/static/js/tailwindcss.min.js"></script>
</body>
</html>
