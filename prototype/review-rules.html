<script>
const API_BASE = '/api/v1';

// authHeaders 与 apiFetch 兼容性辅助（review-rules.html 独立使用）
function authHeaders() {
    const token = localStorage.getItem('auth_token');
    return token ? { 'Authorization': 'Bearer ' + token } : {};
}

async function apiFetch(url, options = {}) {
    const token = localStorage.getItem('auth_token');
    const headers = Object.assign({}, options.headers || {});
    if (token) headers['Authorization'] = 'Bearer ' + token;
    if (!headers['Content-Type'] && options.body) headers['Content-Type'] = 'application/json';
    const resp = await fetch(url, Object.assign({}, options, { headers }));
    if (resp.status === 401) {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('user_info');
        window.location.href = '/login.html';
        throw new Error('未登录');
    }
    return resp;
}

let rulesData = [];
let categoriesData = [];
let pendingDeleteRuleId = null;
let currentPage = 1;
let pageSize = 15;
let totalPages = 1;

const severityLabels = { critical: '严重', high: '高危', medium: '中危', low: '低危', info: '提示' };
const severityColors = { critical: 'text-red-600 bg-red-50', high: 'text-orange-600 bg-orange-50', medium: 'text-yellow-600 bg-yellow-50', low: 'text-blue-600 bg-blue-50', info: 'text-gray-600 bg-gray-50' };
const languageLabels = { common: '通用', golang: 'Go', python: 'Python', frontend: '前端', java: 'Java' };

const categoryStyleMap = {
    'security': { bg: 'bg-red-50', text: 'text-red-700' },
    'performance': { bg: 'bg-orange-50', text: 'text-orange-700' },
    'readability': { bg: 'bg-blue-50', text: 'text-blue-700' },
    'maintainability': { bg: 'bg-green-50', text: 'text-green-700' },
    'test_coverage': { bg: 'bg-purple-50', text: 'text-purple-700' }
};

async function loadCategories() {
    try {
        const res = await apiFetch(API_BASE + '/review-categories');
        const data = await res.json();
        categoriesData = data.data || [];
        renderCategoryFilter();
        renderCategoryTags();
        renderCreateCategorySelect();
    } catch (e) {
        console.error('加载维度失败:', e);
    }
}

function renderCategoryFilter() {
    const sel = document.getElementById('categoryFilter');
    if (!sel) return;
    sel.innerHTML = '<option value="">全部维度</option>' +
        categoriesData.map(c => `<option value="${c.code}">${c.name}</option>`).join('');
}

function renderCreateCategorySelect() {
    const sel = document.getElementById('createCategory');
    if (!sel) return;

}

function renderCategoryTags() {
    const container = document.getElementById('categoryTags');
    if (!container) return;
    if (categoriesData.length === 0) {
        container.innerHTML = '<span class="text-gray-400 text-sm">加载中...</span>';
        return;
    }
    container.innerHTML = categoriesData.map(c => {
        const isBuiltin = c.is_built_in;
        return `<span class="px-3 py-1 rounded-full text-xs font-medium ${isBuiltin ? 'bg-blue-50 text-blue-700' : 'bg-green-50 text-green-700'} border">
            ${c.name}${isBuiltin ? ' <span class="text-gray-400">(内置)</span>' : ''}
        </span>`;
    }).join('');
}

async function loadRules() {
    const keyword = document.getElementById('searchInput').value;
    const category = document.getElementById('categoryFilter').value;
    const language = document.getElementById('languageFilter').value;
    const severity = document.getElementById('severityFilter').value;

    const params = new URLSearchParams();
    params.append('page', currentPage);
    params.append('page_size', pageSize);
    if (keyword) params.append('keyword', keyword);
    if (category) params.append('category', category);
    if (language) params.append('language', language);
    if (severity) params.append('severity', severity);

    const grid = document.getElementById('rulesGrid');
    grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>加载中...</div>';

    try {
        const res = await apiFetch(API_BASE + '/review-rules?' + params.toString());
        const data = await res.json();
        rulesData = data.data || [];
        const total = data.total || 0;
        totalPages = Math.ceil(total / pageSize) || 1;
        renderRules();
        renderPagination(currentPage, totalPages);
        document.getElementById('totalCount').textContent = total;
    } catch (err) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-red-500">加载失败: ' + err.message + '</div>';
    }
}

function renderRules() {
    const grid = document.getElementById('rulesGrid');
    if (rulesData.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">暂无规则</div>';
        return;
    }

    grid.innerHTML = rulesData.map(rule => `
        <div class="rule-card bg-white rounded-lg border border-gray-200 p-4 cursor-pointer severity-${rule.severity}" style="border-left-width: 4px;" onclick="showRuleDetail(${rule.id})">
            <div class="flex items-start justify-between mb-2">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-medium px-2 py-0.5 rounded ${severityColors[rule.severity] || 'text-gray-600 bg-gray-50'}">${severityLabels[rule.severity] || rule.severity}</span>
                    <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-600">${getCategoryName(rule.category)}</span>
                </div>
                <div class="flex items-center gap-2">
                    ${rule.is_built_in ? '<span class="built-in-badge">内置</span>' : '<span class="text-xs px-2 py-0.5 rounded bg-green-50 text-green-600">自定义</span>'}
                    <label class="switch" onclick="event.stopPropagation();toggleRuleEnabled(${rule.id}, this)">
                        <input type="checkbox" ${rule.is_enabled ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <h4 class="font-semibold text-gray-800 text-sm mb-1">${rule.name}</h4>
            <p class="text-xs text-gray-500 mb-2 font-mono">${rule.code}</p>
            <p class="text-xs text-gray-600 line-clamp-2 mb-3">${rule.description || '暂无说明'}</p>
            <div class="flex items-center gap-2">
                <span class="language-tag">${languageLabels[rule.language] || rule.language}</span>

    `).join('');
}

function getCategoryName(code) {
    const cat = categoriesData.find(c => c.code === code);
    return cat ? cat.name : code;
}

async function toggleRuleEnabled(ruleId, switchEl) {
    const checkbox = switchEl.querySelector('input');
    const newState = checkbox.checked;

    try {
        const res = await apiFetch(API_BASE + '/review-rules/batch-enable', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rule_ids: [ruleId], is_enabled: newState })
        });
        if (!res.ok) throw new Error('更新失败');
        showToast(newState ? '规则已启用' : '规则已禁用');
    } catch (err) {
        checkbox.checked = !newState;

    }
}

async function submitCreateRule() {
    const ruleId = document.getElementById('editRuleId').value;
    const isEdit = !!ruleId;
    
    const payload = {
        code: document.getElementById('createCode').value.trim(),
        name: document.getElementById('createName').value.trim(),
        category: document.getElementById('createCategory').value,
        language: document.getElementById('createLanguage').value,
        severity: document.getElementById('createSeverity').value,
        description: document.getElementById('createDescription').value.trim(),
        prompt: document.getElementById('createPrompt').value.trim()
    };

    if (!payload.code || !payload.name || !payload.prompt) {
        showToast('请填写必填项', 'error');
        return;
    }

    try {
        let res;
        if (isEdit) {
            res = await apiFetch(API_BASE + '/review-rules/' + ruleId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } else {
            res = await apiFetch(API_BASE + '/review-rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        if (!res.ok) throw new Error(isEdit ? '保存失败' : '创建失败');
        closeCreateModal();
        loadRules();
        showToast(isEdit ? '规则已更新' : '规则创建成功');
    } catch (err) {
        showToast((isEdit ? '保存失败: ' : '创建失败: ') + err.message, 'error');
    }
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast bg-white border rounded-lg shadow-lg px-4 py-3 mb-2 flex items-center gap-2';
    toast.innerHTML = type === 'success'
        ? `<i class="fas fa-check-circle text-green-500"></i><span class="text-sm">${message}</span>`
        : `<i class="fas fa-exclamation-circle text-red-500"></i><span class="text-sm">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 3000);
}

// ========== 分页相关函数 ==========
function renderPagination(page, pages) {
    const pg = document.getElementById('pagination');
    if (!pg) return;
    if (pages <= 1) {
        pg.innerHTML = '';
        return;
    }
    let html = '';
    html += `<button onclick="goPage(${page - 1})" class="px-3 py-1 border rounded text-sm ${page <= 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
    if (page > 3) {
        html += `<button onclick="goPage(1)" class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50">1</button>`;
        if (page > 4) html += `<span class="px-2 py-1 text-sm text-gray-400">...</span>`;
    }
    let start = Math.max(1, page - 2);
    let end = Math.min(pages, page + 2);
    if (end === pages) {
        start = Math.max(1, pages - 4);
    } else if (start === 1) {
        end = Math.min(pages, 5);
    }
    for (let i = start; i <= end; i++) {
        html += `<button onclick="goPage(${i})" class="px-3 py-1 border rounded text-sm ${i === page ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50'}">${i}</button>`;
    }
    if (page < pages - 2) {
        if (page < pages - 3) html += `<span class="px-2 py-1 text-sm text-gray-400">...</span>`;
        html += `<button onclick="goPage(${pages})" class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50">${pages}</button>`;
    }
    html += `<button onclick="goPage(${page + 1})" class="px-3 py-1 border rounded text-sm ${page >= pages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page >= pages ? 'disabled' : ''}>下一页</button>`;
    pg.innerHTML = html;
}

function goPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadRules();
}

}
