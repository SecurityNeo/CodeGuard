<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>html{background-color:#1e293b;}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <script src="js/auth.js?v=5"></script>

    <script src="js/sidebar.js?v=2"></script>
    <link rel="stylesheet" href="/static/fontawesome/6.5.0/css/all.min.css">
    <style>
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #3b82f6; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; cursor: pointer; }
        .status-red { background-color: #ef4444; }
        .status-yellow { background-color: #f59e0b; }
        .status-green { background-color: #10b981; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(18px); }
        .modal { display: none; }
        .modal.active { display: flex; }
        .tab-btn { padding: 8px 20px; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; color: #6b7280; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; font-weight: 500; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .code-block { background-color: #1e293b; color: #e2e8f0; font-family: monospace; font-size: 13px; line-height: 1.6; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
<div id="page-transition" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#1e293b;z-index:99999;transition:opacity .25s ease;"></div>
<script>
(function(){
  function hide(){var el=document.getElementById('page-transition');if(el){el.style.opacity='0';setTimeout(function(){el.remove();},250);}}
  if(document.readyState==='complete'){hide();}else{window.addEventListener('load',hide);}
})();
</script>
<div id="toastContainer"></div>

    <script>
        function showToast(message, type = 'success') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const icons = { success: 'fa-check', error: 'fa-times', info: 'fa-info' };
            const toast = document.createElement('div');
            toast.className = `toast ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

const API_BASE = '/api/v1';

        function toggleTokenVisibility() {
            var input = document.getElementById('projectToken');
            var icon = document.getElementById('tokenEyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        let projectsData = [];
        let templatesData = [];
        let poolsData = [];
        let modelsData = [];
        let editingId = null;
        let editingTemplateId = null;
        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;

        async function loadProjects() {
            const keyword = document.getElementById('searchInput')?.value || '';
            const status = document.getElementById('statusFilter')?.value || '';

            let url = `${API_BASE}/projects?page=${currentPage}&page_size=${pageSize}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if (status) url += `&status=${status}`;

            try {
                const res = await apiFetch(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                projectsData = json.data || [];
                const total = json.total || 0;
                totalPages = Math.ceil(total / 10);
                renderProjects(projectsData);
                renderPagination(total, currentPage);
            } catch (e) {
                console.error('加载项目失败:', e);
                showToast('加载项目失败: ' + e.message, 'error');
            }
        }

        function renderProjects(projects) {
            const tbody = document.getElementById('projectsBody');
            if (!tbody) return;
            
            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-8 text-center text-gray-500">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = projects.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                                <i class="fab fa-gitlab text-sm"></i>
                            </div>
                            <a href="project-detail.html?id=${p.id}" class="font-medium text-sm text-blue-600 hover:text-blue-700">${p.name || '-'}</a>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600">${p.gitlab_project_id || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 max-w-xs truncate" title="${p.project_path || ''}">${p.project_path || '-'}</td>
                    <td class="px-6 py-4 text-sm">${p.template?.Name || '-'}</td>
                    <td class="px-6 py-4 text-center">
                        ${p.tasks && p.tasks.length > 0 ? p.tasks.map(t => `<span class="inline-block w-3 h-3 mr-1 mb-1 rounded-full ${getTaskStatusDotClass(t.status)}" title="${getTaskStatusText(t.status)}"></span>`).join('') : '-'}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <label class="switch">
                            <input type="checkbox" ${p.ai_enabled ? 'checked' : ''} onchange="toggleAI(${p.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">${formatDate(p.updated_at)}</td>
                    <td class="px-6 py-4 text-center">
                        <a href="project-detail.html?id=${p.id}" class="text-blue-600 hover:text-blue-700 text-sm mr-3">详情</a>
                        <button onclick="editProject(${p.id})" class="text-gray-600 hover:text-gray-800 text-sm mr-3">编辑</button>
                        <button onclick="deleteProject(${p.id})" class="text-red-600 hover:text-red-700 text-sm">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(total, page) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;

            const totalText = document.getElementById('totalCount');
            if (totalText) totalText.textContent = `共 ${total} 条记录`;

            totalPages = Math.ceil(total / pageSize);
            const pages = totalPages;
            if (pages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            // 上一页
            html += `<button class="px-3 py-1 border rounded text-sm ${page <= 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">上一页</button>`;

            // 首页
            if (page > 3) {
                html += `<button class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50" onclick="goPage(1)">1</button>`;
                if (page > 4) {
                    html += `<span class="px-2 py-1 text-gray-400">...</span>`;
                }
            }

            // 中间页码（以当前页为中心，最多5个）
            let start = Math.max(1, page - 2);
            let end = Math.min(pages, page + 2);
            if (end - start < 4) {
                if (start === 1) {
                    end = Math.min(pages, start + 4);
                } else if (end === pages) {
                    start = Math.max(1, end - 4);
                }
            }
            for (let i = start; i <= end; i++) {
                html += `<button class="px-3 py-1 border rounded text-sm ${i === page ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50'}" onclick="goPage(${i})">${i}</button>`;
            }

            // 尾页
            if (page < pages - 2) {
                if (page < pages - 3) {
                    html += `<span class="px-2 py-1 text-gray-400">...</span>`;
                }
                html += `<button class="px-3 py-1 border rounded text-sm text-gray-500 hover:bg-gray-50" onclick="goPage(${pages})">${pages}</button>`;
            }

            // 下一页
            html += `<button class="px-3 py-1 border rounded text-sm ${page >= pages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}" ${page >= pages ? 'disabled' : ''} onclick="goPage(${page + 1})">下一页</button>`;

            pagination.innerHTML = html;
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value) || 10;
            currentPage = 1;
            loadProjects();
        }

        function goPage(page) {
            currentPage = page;
            loadProjects();
        }

        function getSourceText(source) {
            const map = { manual: '手动创建' };
            return map[source] || '手动创建';
        }

        function getSourceClass(source) {
            return 'bg-gray-100 text-gray-600';
        }

        function getTaskStatusClass(status) {
            if (status === 'success') return 'bg-green-50 text-green-600';
            if (status === 'running') return 'bg-blue-50 text-blue-600';
            if (status === 'failed') return 'bg-red-50 text-red-600';
            if (status === 'timeout') return 'bg-orange-50 text-orange-600';
            return 'bg-gray-50 text-gray-600';
        }

        function getTaskStatusDotClass(status) {
            if (status === 'success') return 'bg-green-500';
            if (status === 'running') return 'bg-blue-500';
            if (status === 'failed') return 'bg-red-500';
            if (status === 'timeout') return 'bg-orange-500';
            return 'bg-gray-400';
        }

        function getTaskStatusText(status) {
            if (status === 'success') return '成功';
            if (status === 'running') return '运行中';
            if (status === 'failed') return '失败';
            if (status === 'timeout') return '超时';
            return '待处理';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const day = d.getDate();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const seconds = String(d.getSeconds()).padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
        }

        async function toggleAI(id, enabled) {
            try {
                const res = await apiFetch(`${API_BASE}/projects/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ai_enabled: enabled })
                });
                if (!res.ok) throw new Error('更新失败');
} catch (e) {
                showToast('删除失败: ' + e.message, 'error');
                loadProjects();
            }
        }

        function editProject(id) {
            const p = projectsData.find(x => x.id === id);
            if (!p) return;
            editingId = id;
            document.querySelector('#createModal h3').textContent = '编辑项目';
            document.getElementById('projectName').value = p.name || '';
            document.getElementById('gitlabProjectId').value = p.gitlab_project_id || '';
            document.getElementById('projectPath').value = p.project_path || '';
            document.getElementById('projectToken').value = p.access_token || '';
            document.getElementById('aiEnabled').checked = p.ai_enabled;
            document.getElementById('projectTemplateId').value = p.template_id || '';
            document.getElementById('poolId').value = p.pool_id || '';
            // default_model_id=0 或未设置时，选中"-1"（不指定）
            document.getElementById('defaultModelId').value = p.default_model_id > 0 ? p.default_model_id : '-1';
            document.getElementById('createModal').classList.add('active');
        }

        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;
            try {
                const res = await apiFetch(`${API_BASE}/projects/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('删除失败');
                showToast('删除成功', 'success');
                loadProjects();
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }

        async function saveProject() {
            const templateId = document.getElementById('projectTemplateId').value;
            const poolId = document.getElementById('poolId').value;
            const defaultModelId = document.getElementById('defaultModelId').value;
            const gitlabProjectId = document.getElementById('gitlabProjectId').value;
            
            const data = {
                name: document.getElementById('projectName').value,
                project_path: document.getElementById('projectPath').value,
                access_token: document.getElementById('projectToken').value,
                ai_enabled: document.getElementById('aiEnabled').checked
            };
            
            if (templateId) data.template_id = parseInt(templateId);
            if (poolId) data.pool_id = parseInt(poolId);
            if (defaultModelId && defaultModelId !== '-1') {
                data.default_model_id = parseInt(defaultModelId);
            } else if (defaultModelId === '-1') {
                data.default_model_id = null;  // 设置为 NULL，清空默认模型
            }
            if (gitlabProjectId) data.gitlab_project_id = parseInt(gitlabProjectId);
            if (!data.access_token) delete data.access_token;

            try {
                const url = editingId ? `${API_BASE}/projects/${editingId}` : `${API_BASE}/projects`;
                const method = editingId ? 'PUT' : 'POST';
                const res = await apiFetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('保存失败');
                showToast(editingId ? '项目更新成功' : '项目创建成功');
                hideModal('createModal');
                editingId = null;
                loadProjects();
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        function showModal(id) { 
            if (id === 'createModal') {
                editingId = null;
                document.querySelector('#createModal h3').textContent = '新建项目';
                document.getElementById('projectName').value = '';
                document.getElementById('gitlabProjectId').value = '';
                document.getElementById('projectPath').value = '';
                document.getElementById('projectToken').value = '';
                document.getElementById('projectToken').type = 'password';
                document.getElementById('tokenEyeIcon').className = 'fas fa-eye';
                document.getElementById('aiEnabled').checked = false;
                document.getElementById('projectTemplateId').value = '';
                document.getElementById('poolId').value = '';
                document.getElementById('defaultModelId').value = '';
            }
            document.getElementById(id).classList.add('active'); 
        }
        
        function switchTab(tab, evt) {
            const event = evt || window.event;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            (event.target || event.srcElement).closest('.tab-btn').classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'templates') {
                loadTemplates();
            }
        }

        async function loadTemplates() {
            try {
                const res = await apiFetch(`${API_BASE}/templates`);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                templatesData = json.data || [];
                renderTemplates(templatesData);
                renderTemplateSelect(templatesData);
            } catch (e) {
                console.error('加载模板失败:', e);
            }
        }

        function renderTemplateSelect(templates) {
            const select = document.getElementById('projectTemplateId');
            if (!select) return;
            select.innerHTML = '<option value="">请选择AI审核提示词</option>' + 
                templates.map(t => `<option value="${t.ID}">${escapeHtml(t.Name)}</option>`).join('');
        }

        async function loadPools() {
            try {
                const res = await apiFetch(`${API_BASE}/pools`);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                poolsData = json.data || [];
                renderPoolSelect(poolsData);
            } catch (e) {
                console.error('加载资源池失败:', e);
            }
        }

        function renderPoolSelect(pools) {
            const select = document.getElementById('poolId');
            if (!select) return;
            select.innerHTML = '<option value="">请选择资源池</option>' + 
                pools.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
        }

        async function loadModels() {
            try {
                const res = await apiFetch(`${API_BASE}/models`);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                modelsData = json.data || [];
                renderModelSelect(modelsData);
            } catch (e) {
                console.error('加载模型失败:', e);
            }
        }

        function renderModelSelect(models) {
            const select = document.getElementById('defaultModelId');
            if (!select) return;
            select.innerHTML = '<option value="">请选择默认模型</option>' + 
                '<option value="-1">不指定（走全局主备链路）</option>' + 
                models.map(m => `<option value="${m.id}">${escapeHtml(m.provider + '-' + m.model_id)}</option>`).join('');
        }

        function renderTemplates(templates) {
            const container = document.getElementById('templatesContainer');
            if (!container) return;
            
            if (templates.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">暂无模板，请创建</div>';
                return;
            }

            const colors = ['blue', 'yellow', 'green', 'purple', 'pink', 'indigo'];
            container.innerHTML = templates.map((t, i) => `
                <div class="bg-white rounded-xl border overflow-hidden">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-${colors[i % colors.length]}-50 rounded-lg flex items-center justify-center text-${colors[i % colors.length]}-600">
                                    <i class="fas fa-file-code"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800">${escapeHtml(t.Name)}</h3>
                                    <p class="text-sm text-gray-500">${escapeHtml(t.Description || '无描述')}</p>
                                </div>
                            </div>
                            <div class="text-xs text-gray-400 text-right">
                                <div>创建: ${formatDate(t.CreatedAt)}</div>
                                <div>修改: ${formatDate(t.UpdatedAt)}</div>
                            </div>
                        </div>
                        <div class="code-block rounded-lg p-4 overflow-x-auto">
                            <div class="text-gray-400 mb-2">// 提示词内容</div>
                            <pre class="whitespace-pre-wrap text-sm">${escapeHtml(t.Prompt)}</pre>
                        </div>
                    </div>
                    <div class="px-6 py-3 border-t bg-gray-50 flex justify-end gap-3">
                        <button onclick="cloneTemplate(${t.ID})" class="text-indigo-600 hover:text-indigo-700 text-sm"><i class="fas fa-copy mr-1"></i>克隆</button>
                        <button onclick="editTemplate(${t.ID})" class="text-gray-600 hover:text-gray-800 text-sm"><i class="fas fa-edit mr-1"></i>编辑</button>
                        <button onclick="deleteTemplate(${t.ID})" class="text-red-600 hover:text-red-700 text-sm"><i class="fas fa-trash mr-1"></i>删除</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function editTemplate(id) {
            const t = templatesData.find(x => x.ID === id);
            if (!t) return;
            editingTemplateId = id;
            document.querySelector('#templateModal h3').textContent = '编辑AI审核提示词';
            document.querySelector('#templateModal input[type="text"]').value = t.Name || '';
            document.querySelectorAll('#templateModal input[type="text"]')[1].value = t.Description || '';
            document.querySelector('#templateModal textarea').value = t.Prompt || '';
            showModal('templateModal');
        }

        let cloningTemplateId = null;

        async function cloneTemplate(id) {
            cloningTemplateId = id;
            document.getElementById('cloneTemplateName').value = '';
            showModal('cloneTemplateModal');
        }

        async function confirmCloneTemplate() {
            const name = document.getElementById('cloneTemplateName').value.trim();
            if (!name) {
                showToast('请输入模版名称', 'info');
                return;
            }
            try {
                const res = await apiFetch(`${API_BASE}/templates/${cloningTemplateId}/clone`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error('克隆失败');
                showToast('模板克隆成功');
                hideModal('cloneTemplateModal');
                loadTemplates();
            } catch (e) {
                showToast('克隆失败: ' + e.message, 'error');
            }
        }

        async function deleteTemplate(id) {
            if (!confirm('确定删除该模版？如有关联项目将禁止删除。')) return;
            try {
                const res = await apiFetch(`${API_BASE}/templates/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const json = await res.json();
                    throw new Error(json.error || '删除失败');
                }
                showToast('模版已删除');
                loadTemplates();
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }

        async function saveTemplate() {
            const data = {
                name: document.querySelector('#templateModal input[type="text"]').value,
                description: document.querySelectorAll('#templateModal input[type="text"]')[1].value,
                prompt: document.querySelector('#templateModal textarea').value
            };
            if (!data.name || !data.prompt) {
                showToast('请填写名称和提示词', 'info');
                return;
            }
            try {
                const url = editingTemplateId ? `${API_BASE}/templates/${editingTemplateId}` : `${API_BASE}/templates`;
                const method = editingTemplateId ? 'PUT' : 'POST';
                const res = await apiFetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('保存失败');
                showToast(editingTemplateId ? '模板更新成功' : '模板创建成功');
                hideModal('templateModal');
                editingTemplateId = null;
                loadTemplates();
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        function openNewTemplateModal() {
            editingTemplateId = null;
            document.querySelector('#templateModal h3').textContent = '新建AI审核提示词';
            document.querySelector('#templateModal input[type="text"]').value = '';
            document.querySelectorAll('#templateModal input[type="text"]')[1].value = '';
            document.querySelector('#templateModal textarea').value = '';
            showModal('templateModal');
        }

        function hideModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            if (id === 'createModal') {
                editingId = null;
                document.querySelector('#createModal h3').textContent = '新建项目';
                document.getElementById('projectName').value = '';
                document.getElementById('projectPath').value = '';
                document.getElementById('aiEnabled').checked = false;
            }
            if (id === 'templateModal') {
                editingTemplateId = null;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadProjects();
            loadTemplates();
            loadPools();
            loadModels();
            renderSidebar('projects');
        });
    </script>
    <script defer src="/static/js/tailwindcss.min.js"></script>
</body>
</html>
