<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>html{background-color:#1e293b;}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI审核提示词管理 - CodeGuard</title>
    <script src="js/auth.js?v=5"></script>
    <script src="js/menu-config.js?v=2"></script>
    <script src="js/sidebar.js?v=2"></script>
    <link rel="stylesheet" href="/static/fontawesome/6.5.0/css/all.min.css">
    <style>
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #3b82f6; }
        .tab-btn { padding: 8px 20px; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; color: #6b7280; }
        .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; font-weight: 500; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .code-block { background-color: #1e293b; color: #e2e8f0; font-family: monospace; font-size: 13px; line-height: 1.6; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="page-transition" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#1e293b;z-index:99999;transition:opacity .25s ease;"></div>
<script>
(function(){
  function hide(){var el=document.getElementById('page-transition');if(el){el.style.opacity='0';setTimeout(function(){el.remove();},250);}}
  if(document.readyState==='complete'){hide();}else{window.addEventListener('load',hide);}
})();
</script>
<div id="toastContainer"></div>

<div class="flex h-screen">
    <aside id="sidebar" class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <div><h1 class="font-bold text-lg">CodeGuard</h1><p class="text-xs text-gray-400">代码智能门禁</p></div>
            </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1"></nav>
        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-sm"></i>
                </div>
                <div class="text-sm flex-1">
                    <div class="font-medium" id="currentUser">加载中…</div>
                    <div class="text-xs text-gray-400">开发者</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white border-b px-8 py-4 flex items-center justify-between sticky top-0 z-10">
            <div>
                <h2 class="text-xl font-bold text-gray-800">AI审核提示词管理</h2>
                <p class="text-sm text-gray-500 mt-1">管理 AI 审核使用的提示词模板，配置评审维度权重与评论模板</p>
            </div>
        </header>

        <div class="p-8 space-y-6">
            <!-- 操作栏 -->
            <div class="flex justify-end gap-2">
                <button onclick="openNewTemplateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
                    <i class="fas fa-plus mr-1"></i>新建模版
                </button>
                <button onclick="loadTemplates()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-gray-200">
                    <i class="fas fa-redo mr-1"></i>刷新
                </button>
            </div>

            <!-- 模板列表 -->
            <div class="space-y-4" id="templatesContainer">
                <div class="text-center py-12 text-gray-500">加载中...</div>
            </div>
        </div>
    </main>
</div>

<!-- 新建/编辑模版弹窗 -->
<div id="templateModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
    <div class="bg-white rounded-xl w-[900px] max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg" id="modalTitle">新建AI审核提示词</h3>
            <button onclick="hideModal('templateModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">模版名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="tmplName" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="如：Go代码优化模版">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                    <input type="text" id="tmplDesc" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="模版用途说明">
                </div>
            </div>

            <!-- 评审维度权重 -->
            <div class="bg-gray-50 rounded-lg p-4 border">
                <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                    <i class="fas fa-balance-scale text-blue-500"></i>评分维度权重配置
                </h4>
                <p class="text-xs text-gray-500 mb-3">各维度权重总和必须为 100%</p>
                <div class="grid grid-cols-5 gap-3" id="dimensionInputs">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">安全性</label>
                        <input type="number" data-dim="security" min="0" max="100" value="30" class="w-full px-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">代码质量</label>
                        <input type="number" data-dim="code_quality" min="0" max="100" value="25" class="w-full px-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">可读性</label>
                        <input type="number" data-dim="readability" min="0" max="100" value="20" class="w-full px-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">可维护性</label>
                        <input type="number" data-dim="maintainability" min="0" max="100" value="15" class="w-full px-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">测试覆盖</label>
                        <input type="number" data-dim="test_coverage" min="0" max="100" value="10" class="w-full px-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
                <div class="mt-2 text-right">
                    <span id="weightTotal" class="text-sm font-medium">总计: 100%</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每次评审最多规则数</label>
                    <input type="number" id="tmplMaxRules" min="0" max="20" value="5" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <p class="text-xs text-gray-400 mt-1">每次评审时最多使用的规则条数</p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">项目自定义指令 / 额外说明</label>
                <textarea id="tmplCustomInstruction" rows="3" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="输入项目的特殊审查要求或背景信息..."></textarea>
                <p class="text-xs text-gray-400 mt-1">这些额外指令将被注入到 AI 评审提示词中</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">GitLab 评论模板</label>
                <textarea id="tmplCommentTemplate" rows="10" class="code-block w-full px-4 py-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="输入 Markdown 模板，支持变量：&#10;{{.ProjectName}}, {{.MRTitle}}, {{.OverallScore}}, {{.DimensionsTable}}, {{.IssuesList}}, {{.RecommendationsList}}&#10;{{range .Issues}} {{.RuleName}} {{.Severity}} {{end}}"></textarea>
                <p class="text-xs text-gray-500 mt-1">模板语法：原生 Go text/template</p>
            </div>

            <!-- 兼容性：旧提示词 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">旧版 AI 提示词（兼容模式，已废弃）</label>
                <textarea id="tmplPrompt" rows="6" class="code-block w-full px-4 py-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="仅供兼容旧版本，新建时请使用上方配置..."></textarea>
            </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end gap-3">
            <button onclick="hideModal('templateModal')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">取消</button>
            <button onclick="saveTemplate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">保存</button>
        </div>
    </div>
</div>

<!-- 克隆模版弹窗 -->
<div id="cloneTemplateModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
    <div class="bg-white rounded-xl w-[400px]">
        <div class="px-6 py-4 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg">克隆AI审核提示词</h3>
            <button onclick="hideModal('cloneTemplateModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">新模版名称</label>
                <input type="text" id="cloneTemplateName" placeholder="请输入新模版名称" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end gap-3">
            <button onclick="hideModal('cloneTemplateModal')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">取消</button>
            <button onclick="confirmCloneTemplate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">确定</button>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/v1';
let templatesData = [];
let editingTemplateId = null;
let cloningTemplateId = null;

function showToast(message, type = 'success') {
    const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
    const icons = { success: 'fa-check', error: 'fa-times', info: 'fa-info' };
    const toast = document.createElement('div');
    toast.className = `toast ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3`;
    toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${message}</span>`;
    document.getElementById('toastContainer').appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showModal(id) { document.getElementById(id).classList.add('active'); }
function hideModal(id) { document.getElementById(id).classList.remove('active'); }

// 监听维度权重输入
function bindDimensionInputs() {
    document.querySelectorAll('#dimensionInputs input').forEach(el => {
        el.addEventListener('input', updateWeightTotal);
    });
}
function updateWeightTotal() {
    let total = 0;
    document.querySelectorAll('#dimensionInputs input').forEach(el => {
        total += parseInt(el.value || 0);
    });
    const el = document.getElementById('weightTotal');
    el.textContent = '总计: ' + total + '%';
    el.className = 'text-sm font-medium ' + (total === 100 ? 'text-green-600' : 'text-red-600');
}

async function loadTemplates() {
    try {
        const res = await apiFetch(`${API_BASE}/templates`);
        const json = await res.json();
        templatesData = json.data || [];
        renderTemplates(templatesData);
    } catch (e) {
        console.error('加载模板失败:', e);
        document.getElementById('templatesContainer').innerHTML = '<div class="text-center py-12 text-red-500">加载失败: ' + escapeHtml(e.message) + '</div>';
    }
}

function renderTemplates(templates) {
    const container = document.getElementById('templatesContainer');
    if (!container) return;

    if (templates.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-gray-500">暂无模版</div>';
        return;
    }

    container.innerHTML = templates.map(t => `
        <div class="bg-white rounded-xl border p-5 hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-2">
                        <h3 class="font-bold text-gray-800">${escapeHtml(t.Name)}</h3>
                        ${t.IsDefault ? '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">默认</span>' : ''}
                    </div>
                    <p class="text-sm text-gray-500 mb-3">${escapeHtml(t.Description || '暂无描述')}</p>
                    <div class="flex flex-wrap gap-2 mb-3">
                        ${renderDimensionTags(t.DimensionWeights)}
                        ${parseDimWeights(t.DimensionWeights).isDefault ? '<span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">默认权重</span>' : '<span class="px-2 py-0.5 bg-indigo-100 text-indigo-600 text-xs rounded">自定义权重</span>'}
                        <span class="px-2 py-0.5 bg-purple-100 text-purple-600 text-xs rounded">最多 ${t.MaxRulesPerReview || 5} 条规则</span>
                        ${t.GitLabCommentTemplate ? '<span class="px-2 py-0.5 bg-green-100 text-green-600 text-xs rounded">自定义评论模板</span>' : ''}
                    </div>
                    ${t.CustomInstruction ? `<p class="text-xs text-gray-400 mb-2"><i class="fas fa-info-circle mr-1"></i>${escapeHtml(t.CustomInstruction.substring(0, 80))}${t.CustomInstruction.length > 80 ? '...' : ''}</p>` : ''}
                </div>
                <div class="flex gap-2 ml-4">
                    <button onclick="openEditTemplateModal(${t.ID})" class="p-2 text-gray-400 hover:text-blue-600" title="编辑"><i class="fas fa-edit"></i></button>
                    <button onclick="openCloneModal(${t.ID})" class="p-2 text-gray-400 hover:text-green-600" title="克隆"><i class="fas fa-copy"></i></button>
                    ${!t.IsDefault ? `<button onclick="deleteTemplate(${t.ID})" class="p-2 text-gray-400 hover:text-red-600" title="删除"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            </div>
        </div>
    `).join('');
}

function parseDimWeights(jsonStr) {
    const defaults = { security: 30, code_quality: 25, readability: 20, maintainability: 15, test_coverage: 10 };
    if (!jsonStr || jsonStr === '{}') {
        const defaultEntries = Object.entries(defaults);
        const tags = defaultEntries.map(([k, v]) =>
            `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">${getDimName(k)} ${v}%</span>`
        ).join(' ');
        return { tags, isDefault: true };
    }
    try {
        const obj = JSON.parse(jsonStr);
        const entries = Object.entries(obj).filter(([_, v]) => v > 0);
        const tags = entries.map(([k, v]) =>
            `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">${getDimName(k)} ${v}%</span>`
        ).join(' ');
        // 检查是否是默认权重
        let isDefault = true;
        for (const [k, v] of Object.entries(defaults)) {
            if ((obj[k] || 0) !== v) { isDefault = false; break; }
        }
        return { tags, isDefault };
    } catch (e) {
        return { tags: '', isDefault: true };
    }
}

function renderDimensionTags(jsonStr) {
    return parseDimWeights(jsonStr).tags;
}

function getDimName(key) {
    const map = {
        security: '安全性',
        code_quality: '代码质量',
        readability: '可读性',
        maintainability: '可维护性',
        test_coverage: '测试覆盖'
    };
    return map[key] || key;
}

function openNewTemplateModal() {
    editingTemplateId = null;
    document.getElementById('modalTitle').textContent = '新建AI审核提示词';
    document.getElementById('tmplName').value = '';
    document.getElementById('tmplDesc').value = '';
    document.getElementById('tmplPrompt').value = '';
    document.getElementById('tmplCustomInstruction').value = '';
    document.getElementById('tmplCommentTemplate').value = '';
    document.getElementById('tmplMaxRules').value = 5;
    // 重置维度权重
    const defaultWeights = { security: 30, code_quality: 25, readability: 20, maintainability: 15, test_coverage: 10 };
    document.querySelectorAll('#dimensionInputs input').forEach(el => {
        el.value = defaultWeights[el.dataset.dim] || 0;
    });
    updateWeightTotal();
    showModal('templateModal');
}

function openEditTemplateModal(id) {
    const t = templatesData.find(x => x.ID === id);
    if (!t) return;
    editingTemplateId = id;
    document.getElementById('modalTitle').textContent = '编辑AI审核提示词';
    document.getElementById('tmplName').value = t.Name || '';
    document.getElementById('tmplDesc').value = t.Description || '';
    document.getElementById('tmplPrompt').value = t.Prompt || '';
    document.getElementById('tmplCustomInstruction').value = t.CustomInstruction || '';
    document.getElementById('tmplCommentTemplate').value = t.GitLabCommentTemplate || '';
    document.getElementById('tmplMaxRules').value = t.MaxRulesPerReview || 5;

    // 加载维度权重
    const defaults = { security: 30, code_quality: 25, readability: 20, maintainability: 15, test_coverage: 10 };
    let weights = defaults;
    if (t.DimensionWeights) {
        try { weights = { ...defaults, ...JSON.parse(t.DimensionWeights) }; } catch(e){}
    }
    document.querySelectorAll('#dimensionInputs input').forEach(el => {
        el.value = weights[el.dataset.dim] || 0;
    });
    updateWeightTotal();
    showModal('templateModal');
}

function openCloneModal(id) {
    cloningTemplateId = id;
    const t = templatesData.find(x => x.ID === id);
    document.getElementById('cloneTemplateName').value = t ? (t.Name + ' - 副本') : '';
    showModal('cloneTemplateModal');
}

async function confirmCloneTemplate() {
    if (!cloningTemplateId) return;
    const name = document.getElementById('cloneTemplateName').value.trim();
    if (!name) {
        showToast('请输入模版名称', 'error');
        return;
    }
    try {
        const res = await apiFetch(`${API_BASE}/templates/${cloningTemplateId}/clone`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast('克隆成功');
        hideModal('cloneTemplateModal');
        loadTemplates();
    } catch (e) {
        showToast('克隆失败: ' + e.message, 'error');
    }
}

async function deleteTemplate(id) {
    const t = templatesData.find(x => x.ID === id);
    if (!confirm(`确定删除模版 "${t.Name}" 吗？`)) return;
    try {
        const res = await apiFetch(`${API_BASE}/templates/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast('删除成功');
        loadTemplates();
    } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
    }
}

async function saveTemplate() {
    const name = document.getElementById('tmplName').value.trim();
    if (!name) {
        showToast('请输入模版名称', 'error');
        return;
    }

    // 检查权重之和
    let totalWeight = 0;
    const dimensionWeights = {};
    document.querySelectorAll('#dimensionInputs input').forEach(el => {
        const val = parseInt(el.value || 0);
        dimensionWeights[el.dataset.dim] = val;
        totalWeight += val;
    });
    if (totalWeight !== 100) {
        showToast(`维度权重总和必须是 100%，当前为 ${totalWeight}%`, 'error');
        return;
    }

    const data = {
        name,
        description: document.getElementById('tmplDesc').value,
        prompt: document.getElementById('tmplPrompt').value,
        custom_instruction: document.getElementById('tmplCustomInstruction').value,
        dimension_weights: JSON.stringify(dimensionWeights),
        max_rules_per_review: parseInt(document.getElementById('tmplMaxRules').value) || 5,
        gitlab_comment_template: document.getElementById('tmplCommentTemplate').value,
    };

    try {
        const url = editingTemplateId
            ? `${API_BASE}/templates/${editingTemplateId}`
            : `${API_BASE}/templates`;
        const res = await apiFetch(url, {
            method: editingTemplateId ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        showToast(editingTemplateId ? '更新成功' : '创建成功');
        hideModal('templateModal');
        loadTemplates();
    } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadTemplates();
    renderSidebar('project-settings');
    bindDimensionInputs();
});
</script>
</body>
</html>
