<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>html{background-color:#f3f4f6;}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - CodeGuard</title>
    <script src="js/auth.js?v=5"></script>
    <script src="js/menu-config.js?v=2"></script>
    <script src="js/sidebar.js?v=2"></script>
    <link rel="stylesheet" href="/static/fontawesome/6.5.0/css/all.min.css">
    <script src="/static/js/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/highlight-github-dark.min.css">
    <script src="/static/js/highlight.min.js"></script>
    <script src="/static/js/highlight-diff.min.js"></script>
    <style>
        .status-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-running { background-color: #dbeafe; color: #1e40af; }
        .status-success { background-color: #d1fae5; color: #065f46; }
        .status-failed { background-color: #fee2e2; color: #991b1b; }
        .status-timeout { background-color: #fce7f3; color: #9d174d; }
        .status-stopped { background-color: #f3f4f6; color: #6b7280; }
        .task-type-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .task-type-badge.chat { background-color: #e0e7ff; color: #4338ca; }
        .task-type-badge.review { background-color: #f3e8ff; color: #7c3aed; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #3b82f6; }
        
        /* markdown-body: 渲染 Markdown 完整样式 */
        .markdown-body { line-height: 1.6; }
        .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin: 16px 0 10px; color: #1f2937; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
        .markdown-body h2 { font-size: 1.3em; font-weight: bold; margin: 14px 0 8px; color: #1f2937; }
        .markdown-body h3 { font-size: 1.1em; font-weight: bold; margin: 12px 0 6px; color: #1f2937; }
        .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-weight: bold; margin: 10px 0 4px; color: #374151; }
        .markdown-body p { margin: 8px 0; }
        .markdown-body ul { list-style-type: disc; padding-left: 24px; margin: 8px 0; }
        .markdown-body ol { list-style-type: decimal; padding-left: 24px; margin: 8px 0; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9em; }
        .markdown-body th, .markdown-body td { border: 1px solid #d1d5db; padding: 8px 12px; text-align: left; }
        .markdown-body th { background-color: #f3f4f6; font-weight: 600; }
        .markdown-body tr:nth-child(even) { background-color: #f9fafb; }
        .markdown-body code { background-color: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; color: #ef4444; }
        .markdown-body pre { background-color: #1f2937; color: #e5e7eb; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 2px solid #4b5563; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: relative; }
        .markdown-body pre code { background: none; padding: 0; color: #e5e7eb; }
        .markdown-body pre::before { content: "Diff"; position: absolute; top: -1px; right: -1px; background: #374151; color: #9ca3af; padding: 2px 8px; font-size: 10px; border-bottom-left-radius: 8px; border-top-right-radius: 8px; }
        .markdown-body .hljs-addition { color: #86efac; background-color: rgba(34,197,94,0.1); display: block; }
        .markdown-body .hljs-deletion { color: #fca5a5; background-color: rgba(239,68,68,0.1); display: block; }
        .markdown-body .hljs-meta { color: #93c5fd; }
        .markdown-body .hljs-comment { color: #6b7280; font-style: italic; }
        .markdown-body blockquote { border-left: 4px solid #e5e7eb; padding-left: 12px; margin: 10px 0; color: #6b7280; }
        .markdown-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; }
        .markdown-body strong { font-weight: 700; }
        .markdown-body em { font-style: italic; }
        .markdown-body img { max-width: 100%; border-radius: 6px; }

        .review-panel { }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
<div class="flex h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
      <div class="p-6">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-robot text-xl"></i>
          </div>
          <div><h1 class="font-bold text-lg">CodeGuard</h1><p class="text-xs text-gray-400">代码智能门禁</p></div>
        </div>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1"></nav>
      <div class="p-4 border-t border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
            <i class="fas fa-user text-sm"></i>
          </div>
          <div class="text-sm flex-1">
            <div class="font-medium" id="currentUser">加载中…</div>
            <div class="text-xs text-gray-400">开发者</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 overflow-y-auto">
        <header class="bg-white border-b px-8 py-4 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <a href="tasks.html" class="text-gray-500 hover:text-gray-700 transition-colors">
                    <i class="fas fa-arrow-left text-lg"></i>
                </a>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">任务详情 <span id="detailTaskId" class="text-gray-500 font-mono">#--</span></h2>
                    <p class="text-sm text-gray-500 mt-1">查看任务执行记录、结构化评审及 Issue 列表</p>
                </div>
            </div>
            <div class="flex items-center gap-3" id="headerActions">
            </div>
        </header>

        <div class="p-8 space-y-6">
            <!-- 单页布局 -->
            <div class="flex gap-6 items-start">
                <!-- 左侧信息面板 -->
                <div class="w-72 flex-shrink-0 space-y-4">
                    <!-- 基本信息 -->
                    <div class="bg-white rounded-xl border p-5">
                        <h3 class="text-sm font-bold text-gray-700 mb-3"><i class="fas fa-info-circle mr-1 text-blue-500"></i>基础信息</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-400">状态</span>
                                <span id="detailStatus">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">评分</span>
                                <span id="detailScore" class="font-medium text-blue-600">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">类型</span>
                                <span id="detailTaskType">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">触发方式</span>
                                <span id="detailTrigger">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">项目</span>
                                <span id="detailProject" class="text-right max-w-[120px] truncate">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">MR</span>
                                <span id="detailMR">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">作者</span>
                                <span id="detailAuthor">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">源分支</span>
                                <span id="detailSourceBranch" class="font-mono text-xs text-blue-600 text-right max-w-[120px] truncate">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">目标分支</span>
                                <span id="detailTargetBranch" class="font-mono text-xs text-blue-600 text-right max-w-[120px] truncate">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">耗时</span>
                                <span id="detailDuration">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">创建时间</span>
                                <span id="detailCreated">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- 错误信息 -->
                    <div id="errorMsgContainer" class="bg-white rounded-xl border p-4 hidden">
                        <h3 class="text-sm font-bold text-red-500 mb-2"><i class="fas fa-exclamation-circle mr-1"></i>错误信息</h3>
                        <p class="text-xs text-red-600 bg-red-50 p-2 rounded" id="detailErrorMsg">-</p>
                    </div>
                </div>

                <!-- 右侧主要内容 -->
                <div class="flex-1 min-w-0 space-y-6">
                    <!-- AI 评审内容展示 -->
                    <div id="detailContentContainer" class="hidden">
                        <!-- Tab 切换 -->
                        <div class="bg-white rounded-xl border mb-4 overflow-hidden">
                            <div class="flex border-b bg-gray-50">
                                <button id="tabStructured" onclick="switchReviewTab('structured')" class="tab-btn review-tab active px-6 py-3 text-sm font-medium border-b-2 border-blue-500 text-blue-600">结构化评审</button>
                                <button id="tabRaw" onclick="switchReviewTab('raw')" class="tab-btn review-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">原始内容</button>
                            </div>
                            
                            <!-- 结构化评审面板 -->
                            <div id="structuredReviewPanel" class="review-panel p-6">
                                <!-- 评审摘要（扣分统计） -->
                                <div id="reviewSummaryArea" class="mb-6 hidden">
                                    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-100 p-5 flex items-center gap-6">
                                        <div class="text-center flex-shrink-0">
                                            <div class="text-4xl font-bold text-blue-600" id="structuredTotalScore">-</div>
                                            <div class="text-xs text-gray-500 mt-1">综合评分</div>
                                        </div>
                                        <div class="flex-1 grid grid-cols-3 gap-4">
                                            <div class="bg-white/80 rounded-lg p-3 text-center border border-blue-100">
                                                <div class="text-xl font-bold text-gray-800" id="summaryIssueCount">0</div>
                                                <div class="text-xs text-gray-500 mt-1">发现问题</div>
                                            </div>
                                            <div class="bg-white/80 rounded-lg p-3 text-center border border-red-100">
                                                <div class="text-xl font-bold text-red-600" id="summaryDeductScore">-0</div>
                                                <div class="text-xs text-gray-500 mt-1">总扣分</div>
                                            </div>
                                            <div class="bg-white/80 rounded-lg p-3 text-center border border-orange-100">
                                                <div class="text-xl font-bold text-orange-600" id="summaryCriticalCount">0</div>
                                                <div class="text-xs text-gray-500 mt-1">严重/高危</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- 维度评分 -->
                                <div id="dimensionScoresArea" class="mb-6 hidden">
                                    <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                        <i class="fas fa-chart-bar text-blue-500"></i>维度评分
                                    </h4>
                                    <div class="flex justify-around items-end gap-4" id="dimensionBars"></div>
                                    <hr class="border-gray-200 mt-4" />
                                </div>
                                
                                <!-- Issue 筛选 -->
                                <div class="flex items-center gap-2 mb-4 flex-wrap bg-gray-50 p-3 rounded-lg">
                                    <span class="text-xs font-medium text-gray-600">筛选：</span>
                                    <button onclick="filterIssues('all')" class="issue-filter-btn active text-xs px-3 py-1.5 rounded-full font-medium bg-blue-100 text-blue-700" data-filter="all">全部</button>
                                    <button onclick="filterIssues('pending')" class="issue-filter-btn text-xs px-3 py-1.5 rounded-full font-medium bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="pending">待处理</button>
                                    <button onclick="filterIssues('accepted')" class="issue-filter-btn text-xs px-3 py-1.5 rounded-full font-medium bg-green-100 text-green-700 hover:bg-green-200" data-filter="accepted">已采纳</button>
                                    <button onclick="filterIssues('rejected')" class="issue-filter-btn text-xs px-3 py-1.5 rounded-full font-medium bg-red-100 text-red-700 hover:bg-red-200" data-filter="rejected">已拒绝</button>
                                    <select id="issueFileFilter" onchange="renderIssues()" class="text-xs px-3 py-1.5 border rounded-lg ml-auto bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                        <option value="">所有文件</option>
                                    </select>
                                </div>
                                
                                <!-- Issue 列表 -->
                                <div id="issuesListArea" class="space-y-3">
                                    <div class="text-center text-gray-400 py-12 font-medium">加载中...</div>
                                </div>
                                
                                <!-- 批量操作 -->
                                <div id="batchActionBar" class="mt-4 pt-4 border-t hidden">
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-gray-600">已选 <span id="selectedIssueCount" class="font-bold text-blue-600">0</span> 项</span>
                                        <button onclick="batchAcceptIssues()" class="text-sm px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium"><i class="fas fa-check mr-1"></i>批量采纳</button>
                                        <button onclick="batchRejectIssues()" class="text-sm px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-medium"><i class="fas fa-times mr-1"></i>批量拒绝</button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 原始内容面板 -->
                            <div id="rawReviewPanel" class="review-panel hidden p-6">
                                <div class="markdown-body" id="detailContentBody">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const API_BASE = '/api/v1';
let currentTaskId = null;
let currentStructuredReview = null;
let issueFilter = 'all';
const taskId = new URLSearchParams(window.location.search).get('id');

// 维度名称映射（从后台 ReviewCategory 加载）
let reviewCategories = {};

async function loadReviewCategories() {
    try {
        const res = await apiFetch(`${API_BASE}/review-categories`);
        const json = await res.json();
        reviewCategories = {};
        (json.data || []).forEach(cat => {
            reviewCategories[cat.code] = cat.name;
        });
    } catch (e) {
        console.error('加载维度分类失败:', e);
        reviewCategories = {};
    }
}

async function loadTask() {
    if (!taskId) {
        document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-red-500 py-12 font-medium">缺少任务 ID</div>';
        return;
    }
    
    try {
        const res = await apiFetch(`${API_BASE}/tasks/${taskId}`);
        const data = await res.json();
        const t = data.data;
        
        const isReviewDetail = t.task_type === 'review';
        document.getElementById('detailTaskId').textContent = '#' + t.id;
        document.getElementById('detailProject').textContent = t.project?.name || '-';
        document.getElementById('detailTaskType').innerHTML = `<span class="task-type-badge ${isReviewDetail ? 'review' : 'chat'}">${getTaskTypeText(t.task_type)}</span>`;
        document.getElementById('detailMR').innerHTML = t.mr_iid ? `<a href="${t.mr_url}" target="_blank" class="text-blue-600 hover:underline font-medium">${t.mr_iid}</a>` : '-';
        document.getElementById('detailAuthor').textContent = t.author || '-';
        document.getElementById('detailStatus').innerHTML = `<span class="status-badge status-${t.status}">${getStatusText(t.status)}</span>`;
        document.getElementById('detailScore').innerHTML = t.score_value > 0 
            ? `<span class="font-bold text-lg">${t.score_value}分</span>${t.raw_ai_score > 0 && t.raw_ai_score !== t.score_value ? ' <span class="text-xs text-orange-500 ml-1">AI原始: ' + t.raw_ai_score + '分</span>' : ''}`
            : '-';
        document.getElementById('detailTrigger').innerHTML = getTriggerSourceBadge(t.trigger_source, t.score_value);
        document.getElementById('detailSourceBranch').textContent = t.source_branch || '-';
        document.getElementById('detailTargetBranch').textContent = t.target_branch || '-';
        document.getElementById('detailDuration').textContent = formatDuration(t.duration_sec);
        document.getElementById('detailCreated').textContent = formatDate(t.created_at);

        // 显示错误信息
        const errorContainer = document.getElementById('errorMsgContainer');
        const errorMsgEl = document.getElementById('detailErrorMsg');
        if (t.error_msg) {
            errorContainer.classList.remove('hidden');
            errorMsgEl.textContent = t.error_msg;
        } else {
            errorContainer.classList.add('hidden');
        }

        // 加载结构化评审内容
        const contentContainer = document.getElementById('detailContentContainer');
        if (isReviewDetail && t.status === 'success') {
            contentContainer.classList.remove('hidden');
            loadStructuredReview(t.id);
            document.getElementById('detailContentBody').innerHTML = t.ai_response ? marked.parse(maskSensitive(t.ai_response)) : '<div class="text-gray-400 text-center py-8">无原始内容</div>';
        } else if (!isReviewDetail && t.status === 'success') {
            // chat 类型：不加载结构化评审，仅展示 AI 对话内容
            contentContainer.classList.remove('hidden');
            document.getElementById('dimensionScoresArea').classList.add('hidden');
            document.getElementById('issuesListArea').classList.add('hidden');
            document.getElementById('detailContentBody').innerHTML = t.ai_response ? marked.parse(maskSensitive(t.ai_response)) : '<div class="text-gray-400 text-center py-8">无原始内容</div>';
        } else {
            contentContainer.classList.add('hidden');
            if (t.status !== 'success') {
                // 即使非成功状态，在原内容区显示提示
                document.getElementById('detailContentBody').innerHTML = '<div class="text-gray-400 text-center py-8">任务未完成，无评审内容</div>';
            }
        }

        // 动态添加操作按钮
        const headerActions = document.getElementById('headerActions');
        let actionsHtml = '';
        if (t.status === 'running' && t.trigger_source === 'chat') {
            actionsHtml += `<button onclick="viewMessages(${t.id})" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors"><i class="fas fa-comments mr-1"></i>实时对话</button>`;
        }
        if (t.ai_response || t.ai_prompt) {
            actionsHtml += `<button onclick="viewLogs(${t.id})" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition-colors"><i class="fas fa-file-alt mr-1"></i>查看日志</button>`;
        }
        if (t.status === 'failed') {
            actionsHtml += `<button onclick="retryTask(${t.id})" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg text-sm hover:bg-red-200 transition-colors"><i class="fas fa-redo mr-1"></i>重试任务</button>`;
        }
        headerActions.innerHTML = actionsHtml;

    } catch (e) {
        document.body.innerHTML = `
            <div class="flex h-full items-center justify-center">
                <div class="text-center">
                    <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
                    <h2 class="text-xl font-bold text-gray-700 mb-2">加载失败</h2>
                    <p class="text-gray-500 mb-4">无法加载任务详情</p>
                    <a href="tasks.html" class="text-blue-600 hover:underline">返回任务列表</a>
                </div>
            </div>
        `;
    }
}

function getTaskTypeText(type) {
    const map = { review: '代码评审', chat: 'AI对话' };
    return map[type] || type;
}

function getStatusText(status) {
    const map = { pending: '待处理', running: '运行中', success: '成功', failed: '失败', timeout: '超时', stopped: '已停止' };
    return map[status] || status;
}

function getTriggerSourceBadge(source, score) {
    if (source === 'webhook') {
        return `<span class="text-xs px-2 py-1 rounded bg-indigo-100 text-indigo-700 font-medium">Webhook</span>`;
    } else if (source === 'manual') {
        return `<span class="text-xs px-2 py-1 rounded bg-green-100 text-green-700 font-medium">手动触发</span>`;
    } else if (source === 'chat') {
        return `<span class="text-xs px-2 py-1 rounded bg-blue-100 text-blue-700 font-medium">AI对话</span>`;
    }
    return `<span class="text-xs px-2 py-1 rounded bg-gray-100 text-gray-600 font-medium">${source || '-'}</span>`;
}

function formatDuration(sec) {
    if (!sec) return '-';
    if (sec < 60) return sec + 's';
    const m = Math.floor(sec / 60);
    if (sec < 3600) return m + 'm' + (sec % 60) + 's';
    const h = Math.floor(sec / 3600);
    return h + 'h' + (m % 60) + 'm';
}

function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function switchReviewTab(tab) {
    document.querySelectorAll('.review-tab').forEach(btn => {
        btn.classList.remove('active', 'border-blue-500', 'text-blue-600');
        btn.classList.add('border-transparent', 'text-gray-500');
    });
    document.querySelectorAll('.review-panel').forEach(panel => panel.classList.add('hidden'));
    
    if (tab === 'structured') {
        document.getElementById('tabStructured').classList.add('active', 'border-blue-500', 'text-blue-600');
        document.getElementById('tabStructured').classList.remove('border-transparent', 'text-gray-500');
        document.getElementById('structuredReviewPanel').classList.remove('hidden');
    } else {
        document.getElementById('tabRaw').classList.add('active', 'border-blue-500', 'text-blue-600');
        document.getElementById('tabRaw').classList.remove('border-transparent', 'text-gray-500');
        document.getElementById('rawReviewPanel').classList.remove('hidden');
        if (typeof hljs !== 'undefined') {
            document.getElementById('detailContentBody').querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }
    }
}

async function loadStructuredReview(taskId) {
    try {
        const res = await apiFetch(`${API_BASE}/tasks/${taskId}/structured-review`);
        const data = await res.json();
        if (data.code === 0 && data.data) {
            currentStructuredReview = data.data;
            currentTaskId = taskId;
            renderStructuredReview();
        } else {
            document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-gray-400 py-12 font-medium">暂无结构化评审数据</div>';
        }
    } catch (err) {
        console.warn('结构化评审加载失败:', err);
        document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-red-400 py-12 font-medium">加载失败</div>';
    }
}

function renderStructuredReview() {
    const data = currentStructuredReview;
    if (!data) return;

    document.getElementById('structuredTotalScore').textContent = data.total_score || '-';
    
    const dimContainer = document.getElementById('dimensionBars');
    if (data.dimension_scores && data.dimension_scores !== '{}') {
        document.getElementById('dimensionScoresArea').classList.remove('hidden');
        try {
            const dims = typeof data.dimension_scores === 'string' ? JSON.parse(data.dimension_scores) : data.dimension_scores;
            // 兜底映射（连不上后台时也显示中文）
            const fallbackLabels = { security: '安全性', code_quality: '代码质量', readability: '可读性', maintainability: '可维护性', test_coverage: '测试覆盖', performance: '性能', dockerfile: 'DockerFile', common: '通用' };
            
            const entries = Object.entries(dims)
                .filter(([_, val]) => {
                    const weight = typeof val === 'object' ? (val.weight || 0) : 0;
                    return weight > 0;
                })
                .sort((a, b) => {
                    const wa = typeof a[1] === 'object' ? (a[1].weight || 0) : 0;
                    const wb = typeof b[1] === 'object' ? (b[1].weight || 0) : 0;
                    return wb - wa;
                });

            if (entries.length === 0) {
                dimContainer.innerHTML = '';
                document.getElementById('dimensionScoresArea').classList.add('hidden');
                return;
            }

            dimContainer.innerHTML = entries.map(([key, val]) => {
                const score = typeof val === 'object' ? val.score : val;
                const weight = typeof val === 'object' ? val.weight : 0;
                const label = reviewCategories[key] || fallbackLabels[key] || key;
                const colorClass = score >= 80 ? 'bg-gradient-to-t from-green-500 to-green-400' : score >= 60 ? 'bg-gradient-to-t from-yellow-500 to-yellow-400' : 'bg-gradient-to-t from-red-500 to-red-400';
                const scoreColor = score >= 60 ? 'text-gray-800' : 'text-red-600';
                const weightText = weight > 0 ? `${weight}%` : '';
                return `
                    <div class="flex flex-col items-center gap-1 flex-shrink-0" style="width: 60px;">
                        <span class="text-sm font-bold ${scoreColor}">${score}</span>
                        <div class="w-10 h-24 bg-gray-100 rounded-lg relative overflow-hidden">
                            <div class="${colorClass} absolute bottom-0 left-0 right-0 rounded-b-lg transition-all duration-700 ease-out" style="height:${score}%"></div>
                        </div>
                        <span class="text-xs text-gray-500 font-medium mt-0.5 text-center leading-tight">${label}</span>
                        <span class="text-[10px] text-gray-400">${weightText}</span>
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('维度评分渲染失败:', e);
            dimContainer.innerHTML = '';
        }
    } else {
        document.getElementById('dimensionScoresArea').classList.add('hidden');
    }

    const fileSelect = document.getElementById('issueFileFilter');
    if (data.issues && data.issues.length > 0) {
        const files = [...new Set(data.issues.map(i => i.file).filter(f => f))];
        fileSelect.innerHTML = '<option value="">所有文件</option>' + 
            files.map(f => `<option value="${f}">${f}</option>`).join('');
    }

    renderIssues();
}

function renderIssues() {
    const data = currentStructuredReview;
    if (!data || !data.issues) {
        document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-gray-400 py-12 font-medium">暂无问题</div>';
        return;
    }

    const fileFilter = document.getElementById('issueFileFilter').value;
    let issues = data.issues;

    if (issueFilter !== 'all') {
        issues = issues.filter(i => i.status === issueFilter);
    }
    if (fileFilter) {
        issues = issues.filter(i => i.file === fileFilter);
    }

    if (issues.length === 0) {
        document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-gray-400 py-12 font-medium">没有符合条件的问题</div>';
        return;
    }

    const severityOrder = { critical: 5, high: 4, medium: 3, low: 2, info: 1 };
    const severityColors = { critical: 'border-red-500 bg-red-50', high: 'border-orange-500 bg-orange-50', medium: 'border-yellow-500 bg-yellow-50', low: 'border-blue-500 bg-blue-50', info: 'border-gray-400 bg-gray-50' };
    const severityLabels = { critical: '严重', high: '高危', medium: '中危', low: '低危', info: '提示' };
    const statusLabels = { pending: '待处理', accepted: '已采纳', rejected: '已拒绝' };
    const statusColors = { pending: 'text-gray-500', accepted: 'text-green-600', rejected: 'text-red-600' };
    const categoryColors = { security: 'bg-red-50 text-red-700 border-red-200', performance: 'bg-orange-50 text-orange-700 border-orange-200', code_quality: 'bg-purple-50 text-purple-700 border-purple-200', readability: 'bg-blue-50 text-blue-700 border-blue-200', maintainability: 'bg-green-50 text-green-700 border-green-200', test_coverage: 'bg-pink-50 text-pink-700 border-pink-200', common: 'bg-gray-50 text-gray-600 border-gray-200' };
    const categoryLabels = { security: '安全', performance: '性能', code_quality: '代码质量', readability: '可读性', maintainability: '可维护性', test_coverage: '测试覆盖', common: '通用' };
    const categoryIcons = { security: 'fa-shield-alt', performance: 'fa-bolt', code_quality: 'fa-cogs', readability: 'fa-eye', maintainability: 'fa-wrench', test_coverage: 'fa-vial', common: 'fa-th-list' };

    // 按严重程度排序（critical > high > medium > low > info），同级按扣分降序
    issues = issues.sort((a, b) => {
        const orderA = severityOrder[a.severity] || 0;
        const orderB = severityOrder[b.severity] || 0;
        if (orderB !== orderA) return orderB - orderA;
        return (b.deduct_score || 0) - (a.deduct_score || 0);
    });

    document.getElementById('issuesListArea').innerHTML = issues.map(issue => `
        <div class="border-l-4 rounded-lg p-4 ${severityColors[issue.severity] || 'border-gray-300 bg-gray-50'} transition-all hover:shadow-md">
            <div class="flex items-start justify-between">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                        <input type="checkbox" class="issue-checkbox rounded cursor-pointer" value="${issue.id}" onchange="updateBatchActionBar()">
                        <span class="text-xs font-bold px-2 py-0.5 rounded ${issue.severity === 'critical' ? 'bg-red-100 text-red-700' : issue.severity === 'high' ? 'bg-orange-100 text-orange-700' : 'bg-gray-100 text-gray-600'}">${severityLabels[issue.severity] || issue.severity}</span>
                        ${issue.deduct_score > 0 ? `<span class="text-xs font-bold px-2 py-0.5 rounded bg-red-50 text-red-600 border border-red-100" title="该 Issue 扣分"><i class="fas fa-minus-circle mr-1 text-[10px]"></i>${issue.deduct_score}分</span>` : ''}
                        <span class="text-xs ${categoryColors[issue.category] || 'bg-gray-100 text-gray-600 border-gray-200'} px-2 py-0.5 rounded border font-medium"><i class="fas ${categoryIcons[issue.category] || 'fa-tag'} mr-1 text-[10px]"></i>${categoryLabels[issue.category] || issue.category}</span>
                        <span class="text-xs text-gray-500 font-mono">${issue.rule_code || '自定义'}</span>
                        <span class="text-xs font-medium ${statusColors[issue.status] || 'text-gray-500'}">[${statusLabels[issue.status] || issue.status}]</span>
                    </div>
                    <p class="text-sm font-medium text-gray-800 leading-relaxed">${issue.message}</p>
                    ${issue.file ? `<p class="text-xs text-gray-500 mt-1.5 flex items-center"><i class="fas fa-file-code mr-1.5 text-gray-400"></i>${issue.file}${issue.line_start > 0 ? ' (第' + issue.line_start + '行)' : ''}</p>` : ''}
                    ${issue.code_snippet ? `<pre class="text-xs bg-gray-900 text-gray-100 p-3 rounded-lg mt-2 overflow-x-auto max-h-32">${issue.code_snippet}</pre>` : ''}
                    ${issue.suggestion ? `<p class="text-xs text-gray-600 mt-1.5 flex items-start"><i class="fas fa-lightbulb mr-1.5 text-yellow-500 mt-0.5"></i><span class="flex-1">${issue.suggestion}</span></p>` : ''}
                    ${issue.reject_reason ? `<p class="text-xs text-red-500 mt-1.5 flex items-start"><i class="fas fa-info-circle mr-1.5 mt-0.5"></i><span class="flex-1">拒绝原因：${issue.reject_reason}</span></p>` : ''}
                </div>
                <div class="flex gap-1 ml-3 ${issue.status === 'pending' ? '' : 'hidden'} flex-shrink-0">
                    <button onclick="resolveIssue(${issue.id}, 'accepted')" class="text-xs px-2.5 py-1.5 bg-green-100 text-green-700 rounded hover:bg-green-200 transition-colors" title="采纳"><i class="fas fa-check"></i></button>
                    <button onclick="showRejectInput(${issue.id})" class="text-xs px-2.5 py-1.5 bg-red-100 text-red-700 rounded hover:bg-red-200 transition-colors" title="拒绝"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="rejectInput-${issue.id}" class="hidden mt-3">
                <input type="text" placeholder="填写拒绝原因..." class="text-xs px-3 py-2 border rounded-lg w-full mb-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" id="rejectReason-${issue.id}">
                <div class="flex gap-2">
                    <button onclick="resolveIssue(${issue.id}, 'rejected', document.getElementById('rejectReason-${issue.id}').value)" class="text-xs px-3 py-1.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">确认拒绝</button>
                    <button onclick="hideRejectInput(${issue.id})" class="text-xs px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg hover:bg-gray-300 transition-colors">取消</button>
                </div>
            </div>
        </div>
    `).join('');

    updateBatchActionBar();
}

function filterIssues(filter) {
    issueFilter = filter;
    document.querySelectorAll('.issue-filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) {
            btn.classList.add('active', 'bg-blue-100', 'text-blue-700');
            btn.classList.remove('bg-gray-100', 'text-gray-600');
        } else {
            btn.classList.remove('active', 'bg-blue-100', 'text-blue-700');
            btn.classList.add('bg-gray-100', 'text-gray-600');
        }
    });
    renderIssues();
}

function showRejectInput(issueId) {
    document.getElementById(`rejectInput-${issueId}`).classList.remove('hidden');
}

function hideRejectInput(issueId) {
    document.getElementById(`rejectInput-${issueId}`).classList.add('hidden');
}

async function resolveIssue(issueId, status, rejectReason) {
    try {
        const res = await apiFetch(`${API_BASE}/tasks/review-issues/batch-resolve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                issues: [{ id: issueId, status: status, reject_reason: rejectReason || '' }]
            })
        });
        if (!res.ok) throw new Error('操作失败');
        showToast(status === 'accepted' ? '已采纳' : '已拒绝', 'success');
        loadStructuredReview(currentTaskId);
    } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
    }
}

function updateBatchActionBar() {
    const checked = document.querySelectorAll('.issue-checkbox:checked');
    const bar = document.getElementById('batchActionBar');
    document.getElementById('selectedIssueCount').textContent = checked.length;
    bar.classList.toggle('hidden', checked.length === 0);
}

async function batchAcceptIssues() {
    const checked = document.querySelectorAll('.issue-checkbox:checked');
    const issues = Array.from(checked).map(cb => ({ id: parseInt(cb.value), status: 'accepted' }));
    await batchResolve(issues, '批量采纳成功');
}

async function batchRejectIssues() {
    const reason = prompt('请输入批量拒绝的原因（可留空）：');
    if (reason === null) return;
    const checked = document.querySelectorAll('.issue-checkbox:checked');
    const issues = Array.from(checked).map(cb => ({ id: parseInt(cb.value), status: 'rejected', reject_reason: reason }));
    await batchResolve(issues, '批量拒绝成功');
}

async function batchResolve(issues, successMsg) {
    try {
        const res = await apiFetch(`${API_BASE}/tasks/review-issues/batch-resolve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ issues })
        });
        if (!res.ok) throw new Error('操作失败');
        showToast(successMsg, 'success');
        loadStructuredReview(currentTaskId);
    } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
    }
}

function maskSensitive(text) {
    if (!text || typeof text !== 'string') return text;
    return text
        .replace(/(oauth2:)[^@]+(@)/g, '$1****$2')
        .replace(/(glpat-)[a-zA-Z0-9_-]+/gi, '$1****')
        .replace(/([a-zA-Z0-9_-]+:)[a-zA-Z0-9_-]+(@[a-zA-Z0-9._:-]+)/g, '$1****$2')
        .replace(/(Bearer\s+)[a-zA-Z0-9_.-]{10,}/gi, '$1****')
        .replace(/(\bsk-)[a-zA-Z0-9]{20,}/g, '$1****')
        .replace(/(api[_-]?key\s*[:=]\s*)\S+/gi, '$1****')
        .replace(/(password\s*[:=]\s*)\S+/gi, '$1****')
        .replace(/(passwd\s*[:=]\s*)\S+/gi, '$1****')
        .replace(/(secret\s*[:=]\s*)\S+/gi, '$1****');
}

function showToast(message, type = 'info') {
    const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
    const toast = document.createElement('div');
    toast.className = `fixed top-4 right-4 ${colors[type] || colors.info} text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// 查看日志
async function viewLogs(id) {
    try {
        const res = await apiFetch(`${API_BASE}/tasks/${id}`);
        const data = await res.json();
        const task = data.data;
        
        let content = '';
        let promptContent = task.ai_prompt || '';
        if (promptContent) {
            promptContent = promptContent.replace(/^@AI\s*/i, '').trim();
        }
        
        if (promptContent) {
            content += '<div class="mb-4"><div class="text-yellow-400 font-bold mb-2">用户输入</div><div class="text-white bg-gray-800 p-3 rounded">' + marked.parse(maskSensitive(promptContent)) + '</div></div>';
        }
        if (task.ai_response) {
            content += '<div class="mb-4"><div class="text-green-400 font-bold mb-2">AI回复</div><div class="text-white bg-gray-800 p-3 rounded">' + marked.parse(maskSensitive(task.ai_response)) + '</div></div>';
        }
        if (task.status === 'failed' && task.error_msg) {
            content += '<div class="mt-4"><div class="text-red-400 font-bold mb-2">失败日志</div><div class="text-white bg-red-900 p-3 rounded">' + marked.parse(task.error_msg) + '</div></div>';
        }
        if (!content) {
            content = '<div class="text-gray-500">暂无数据</div>';
        }
        
        // 在新窗口打开日志
        const win = window.open('', '_blank', 'width=900,height=700');
        win.document.write(`
            <!DOCTYPE html>
            <html>
            <head><title>任务日志 #${id}</title>
            <link rel="stylesheet" href="/static/fontawesome/6.5.0/css/all.min.css">
            <script src="/static/js/marked.min.js"><\/script>
            <link rel="stylesheet" href="/static/css/highlight-github-dark.min.css">
            <script src="/static/js/highlight.min.js"><\/script>
            <style>
                body { background: #1f2937; color: #e5e7eb; padding: 20px; font-family: sans-serif; line-height: 1.6; }
                h2 { color: #60a5fa; border-bottom: 1px solid #374151; padding-bottom: 10px; }
                pre { background: #111827; padding: 16px; border-radius: 8px; overflow-x: auto; }
                code { background: #374151; padding: 2px 4px; border-radius: 3px; }
                a { color: #60a5fa; }
            </style></head>
            <body>
                <h2><i class="fas fa-file-alt mr-2"></i>任务日志 #${id}</h2>
                <div>${content}</div>
                <script>hljs?.highlightAll();<\/script>
            </body>
            </html>
        `);
        win.document.close();
    } catch (e) {
        showToast('加载失败: ' + e.message, 'error');
    }
}

// 实时对话 - 打开独立弹窗
async function viewMessages(id) {
    // 使用现有弹框逻辑，跳转到 tasks.html 的 messagesModal
    // 或者这里我们直接导航回 tasks.html 的弹框
    // 暂时简单实现为跳转回 tasks.html 触发弹框
    window.location.href = `tasks.html?openMessageTaskId=${id}`;
}

function retryTask(id) {
    apiFetch(`${API_BASE}/tasks/${id}/retry`, { method: 'POST' })
        .then(() => showToast('任务已重试', 'success'))
        .catch(e => showToast('重试失败: ' + e.message, 'error'));
}

// 加载当前用户
async function loadUser() {
    try {
        const res = await apiFetch(`${API_BASE}/users/me`);
        const data = await res.json();
        document.getElementById('currentUser').textContent = data.username || data.email || '未知';
    } catch(e) {}
}

// 初始化
window.addEventListener('DOMContentLoaded', async () => {
    await loadReviewCategories();
    loadUser();
    loadTask();
});
