<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGuard - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js?v=4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); }
        .sidebar-item.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #3b82f6; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-red { background-color: #ef4444; }
        .status-yellow { background-color: #f59e0b; }
        .status-green { background-color: #10b981; }
        .status-gray { background-color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-robot text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">CodeGuard</h1>
                        <p class="text-xs text-gray-400">代码智能门禁</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-1">
                <a href="statistics.html" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>首页</span>
                </a>
                <a href="mr-stats.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-code-branch w-5"></i><span>代码提交统计</span>
                </a>
                <a href="projects.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-folder-open w-5"></i>
                    <span>项目管理</span>
                </a>
                <a href="tasks.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-tasks w-5"></i>
                    <span>任务列表</span>
                </a>
                <a href="pools.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-server w-5"></i>
                    <span>任务资源池</span>
                </a>
                <a href="models.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-brain w-5"></i>
                    <span>大模型管理</span>
                </a>
                <div class="space-y-1">
                    <div class="flex items-center justify-between px-4 py-3 rounded-lg text-sm cursor-pointer" onclick="toggleNotifyMenu()">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-bell w-5"></i><span>通知管理</span>
                        </div>
                        <i class="fas fa-chevron-down text-xs transition-transform" id="notifyMenuIcon"></i>
                    </div>
                    <div id="notifyMenu" class="hidden pl-10 space-y-1">
                        <a href="notifiers.html" class="sidebar-item flex items-center gap-3 px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white">企业微信</a>
                        <a href="mail.html" class="sidebar-item flex items-center gap-3 px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white">邮件</a>
                        <a href="report.html" class="sidebar-item flex items-center gap-3 px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white">报告管理</a>
                    </div>
                </div>
                <a href="settings.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-cog w-5"></i>
                    <span>系统管理</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-700">
                <div class="flex items-center gap-3 cursor-pointer" id="userMenuTrigger" onclick="toggleUserMenu()">
                    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-sm"></i>
                    </div>
                    <div class="text-sm flex-1">
                        <div class="font-medium" id="currentUser">管理员</div>
                        <div class="text-xs text-gray-400">管理后台</div>
                    </div>
                    <i class="fas fa-chevron-down text-xs text-gray-400"></i>
                </div>
                <!-- 用户下拉菜单 -->
                <div id="userMenu" class="hidden mt-2 bg-slate-800 rounded-lg py-1">
                    <button onclick="showChangePasswordModal()" class="w-full text-left px-4 py-2 text-sm text-gray-300 hover:bg-slate-700 hover:text-white transition-colors">
                        <i class="fas fa-key w-5"></i>修改密码
                    </button>
                    <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-gray-300 hover:bg-slate-700 hover:text-white transition-colors">
                        <i class="fas fa-sign-out-alt w-5"></i>退出登录
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto">
            <!-- 顶部栏 -->
            <header class="bg-white border-b px-8 py-4 flex items-center justify-between sticky top-0 z-10">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">首页</h2>
                    <p class="text-sm text-gray-500 mt-1">数据概览与快捷操作</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500" id="current-time"></span>
                </div>
            </header>

            <div class="p-8 space-y-6">
                <!-- 数据概览卡片 -->
                <div class="grid grid-cols-5 gap-6">
                    <div class="bg-white rounded-xl p-6 card-hover border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-folder-open text-blue-600 text-xl"></i>
                            </div>
                            <span class="text-xs text-gray-400">总计</span>
                        </div>
                        <div class="text-3xl font-bold text-gray-800" id="total-projects">-</div>
                        <div class="text-sm text-gray-500 mt-1">项目总数</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 card-hover border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-tasks text-purple-600 text-xl"></i>
                            </div>
                            <span class="text-xs text-gray-400">今日</span>
                        </div>
                        <div class="text-3xl font-bold text-gray-800" id="today-tasks">-</div>
                        <div class="text-sm text-gray-500 mt-1">今日任务数</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 card-hover border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 bg-yellow-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-spinner fa-spin text-yellow-600 text-xl"></i>
                            </div>
                            <span class="text-xs text-gray-400">实时</span>
                        </div>
                        <div class="text-3xl font-bold text-gray-800" id="running-tasks">-</div>
                        <div class="text-sm text-gray-500 mt-1">运行中任务</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 card-hover border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                            </div>
                            <span class="text-xs text-red-600 bg-red-50 px-2 py-1 rounded">24h内</span>
                        </div>
                        <div class="text-3xl font-bold text-red-600" id="failed-tasks">-</div>
                        <div class="text-sm text-gray-500 mt-1">失败任务</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 card-hover border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center">
                                <i class="fas fa-server text-green-600 text-xl"></i>
                            </div>
                            <span class="text-xs text-gray-400">可用</span>
                        </div>
                        <div class="text-3xl font-bold text-gray-800" id="active-pools">-</div>
                        <div class="text-sm text-gray-500 mt-1">活跃资源池</div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div class="grid grid-cols-3 gap-6" style="min-height: 420px;">
                    <div class="col-span-2 bg-white rounded-xl p-6 border flex flex-col" style="min-height: 420px;">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-gray-800">近7日任务趋势</h3>
                            <div class="flex gap-2">
                                <span class="flex items-center text-xs text-gray-500"><span class="w-3 h-3 rounded-full bg-green-500 mr-1"></span>成功</span>
                                <span class="flex items-center text-xs text-gray-500"><span class="w-3 h-3 rounded-full bg-red-500 mr-1"></span>失败</span>
                            </div>
                        </div>
                        <div class="flex-1 relative" style="min-height: 320px;">
                            <canvas id="trendChart" style="display: block; box-sizing: border-box; height: 100%; width: 100%;"></canvas>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-6 border flex flex-col" style="min-height: 420px;">
                        <h3 class="font-bold text-gray-800 mb-4">项目任务分布</h3>
                        <div class="flex-1 relative" style="min-height: 320px;">
                            <canvas id="pieChart" style="display: block; box-sizing: border-box; height: 100%; width: 100%;"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 快捷操作区 -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl p-6 border">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-gray-800">最近访问项目</h3>
                            <a href="projects.html" class="text-sm text-blue-600 hover:text-blue-700">查看全部</a>
                        </div>
                        <div class="space-y-3" id="recent-projects">
                            <div class="text-center text-gray-400 py-8">加载中...</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl p-6 border">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold text-gray-800">待处理失败任务</h3>
                            <a href="tasks.html?status=failed" class="text-sm text-red-600 hover:text-red-700">查看全部</a>
                        </div>
                        <div class="space-y-3" id="recent-failures">
                            <div class="text-center text-gray-400 py-8">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let trendChart = null;
        let pieChart = null;

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 60000);

        // 加载统计数据
        async function loadStats() {
            try {
                const resp = await apiFetch('/api/v1/dashboard/stats');
                const data = await resp.json();
                document.getElementById('total-projects').textContent = data.total_projects || 0;
                document.getElementById('today-tasks').textContent = data.today_tasks || 0;
                document.getElementById('running-tasks').textContent = data.running_tasks || 0;
                document.getElementById('failed-tasks').textContent = data.failed_tasks_24h || 0;
                document.getElementById('active-pools').textContent = data.active_pools || 0;
            } catch (e) {
                console.error('loadStats failed:', e);
            }
        }

        // 加载趋势图
        async function loadTrends() {
            try {
                const resp = await apiFetch('/api/v1/dashboard/trends');
                const data = await resp.json();
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                if (trendChart) trendChart.destroy();
                
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels || [],
                        datasets: [
                            {
                                label: '成功',
                                data: data.success || [],
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: '失败',
                                data: data.failed || [],
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                tension: 0.4,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                            x: { grid: { display: false } }
                        },
                        layout: { padding: { top: 10, right: 10, bottom: 10, left: 10 } }
                    }
                });
            } catch (e) {
                console.error('loadTrends failed:', e);
            }
        }

        // 加载任务分布饼图
        async function loadTaskDistribution() {
            try {
                const resp = await apiFetch('/api/v1/dashboard/task-distribution');
                const data = await resp.json();
                
                const ctx = document.getElementById('pieChart').getContext('2d');
                if (pieChart) pieChart.destroy();
                
                pieChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.labels || [],
                        datasets: [{
                            data: data.data || [],
                            backgroundColor: data.colors || ['#3b82f6', '#f59e0b', '#8b5cf6', '#10b981', '#ec4899', '#6b7280']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                position: 'bottom', 
                                labels: { boxWidth: 12, font: { size: 11 }, padding: 16 } 
                            }
                        },
                        layout: { padding: { top: 10, right: 10, bottom: 10, left: 10 } }
                    }
                });
            } catch (e) {
                console.error('loadTaskDistribution failed:', e);
            }
        }

        // 加载最近项目
        async function loadRecentProjects() {
            try {
                const resp = await apiFetch('/api/v1/dashboard/recent-projects');
                const result = await resp.json();
                const data = result.data || [];
                const container = document.getElementById('recent-projects');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-8">暂无项目数据</div>';
                    return;
                }
                
                const colors = ['blue', 'orange', 'purple', 'green', 'pink', 'yellow'];
                container.innerHTML = data.map((p, i) => {
                    const color = colors[i % colors.length];
                    const taskDots = p.tasks && p.tasks.length > 0 
                        ? p.tasks.map(t => `<span class="status-dot status-${getStatusColor(t.status)}"></span>`).join('')
                        : '<span class="status-dot status-gray"></span>';
                    return `
                        <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg cursor-pointer" onclick="window.location.href='project-detail.html?id=${p.id}'">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-${color}-100 rounded-lg flex items-center justify-center text-${color}-600">
                                    <i class="fab fa-gitlab text-sm"></i>
                                </div>
                                <div>
                                    <div class="font-medium text-sm">${p.name || '未知项目'}</div>
                                    <div class="text-xs text-gray-400">${(p.project_path || '').substring(0, 40)}${(p.project_path || '').length > 40 ? '...' : ''}</div>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                ${taskDots}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('loadRecentProjects failed:', e);
                document.getElementById('recent-projects').innerHTML = '<div class="text-center text-red-400 py-8">加载失败</div>';
            }
        }

        // 加载最近失败任务
        async function loadRecentFailures() {
            try {
                const resp = await apiFetch('/api/v1/dashboard/recent-failures');
                const result = await resp.json();
                const data = result.data || [];
                const container = document.getElementById('recent-failures');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-8">暂无失败任务</div>';
                    return;
                }
                
                container.innerHTML = data.map(t => `
                    <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg border border-red-100">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center text-red-600">
                                <i class="fas fa-times text-sm"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">${t.project_name || '未知项目'} MR-${t.mr_merge_id || '-'}</div>
                                <div class="text-xs text-red-500">${t.error_msg || '任务执行失败'}</div>
                            </div>
                        </div>
                        <button class="text-xs bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700" onclick="retryTask(${t.id})">重试</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('loadRecentFailures failed:', e);
                document.getElementById('recent-failures').innerHTML = '<div class="text-center text-red-400 py-8">加载失败</div>';
            }
        }

        function getStatusColor(status) {
            switch (status) {
                case 'success': return 'green';
                case 'failed': return 'red';
                case 'running': return 'yellow';
                case 'pending': return 'gray';
                case 'timeout': return 'red';
                default: return 'gray';
            }
        }

        async function retryTask(taskId) {
            if (!confirm('确定要重试该任务吗？')) return;
            try {
                const resp = await apiFetch(`/api/v1/tasks/${taskId}/retry`, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    alert('任务已重新提交');
                    loadRecentFailures();
                    loadStats();
                } else {
                    alert('重试失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('重试失败: ' + e.message);
            }
        }

        // 初始化
        loadStats();
        loadTrends();
        loadTaskDistribution();
        loadRecentProjects();
        loadRecentFailures();

        // 每30秒刷新统计数据
        setInterval(() => {
            loadStats();
            loadRecentFailures();
        }, 30000);
    </script>
</body>
</html>
