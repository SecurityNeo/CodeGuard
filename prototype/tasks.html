            const statusIcon = status === 'completed' ? 'fa-check-circle text-green-500' :
                              status === 'running' ? 'fa-spinner fa-spin text-blue-500' :
                              status === 'error' ? 'fa-times-circle text-red-500' :
                              'fa-wrench text-gray-400';
            const statusLabel = status === 'completed' ? '完成' :
                               status === 'running' ? '运行中...' :
                               status === 'error' ? '失败' : '等待中...';
            const statusClass = status === 'completed' ? 'text-green-600' :
                               status === 'running' ? 'text-blue-600' :
                               status === 'error' ? 'text-red-600' : 'text-gray-500';

            partEl.innerHTML = `
                <div class="my-1 rounded-lg overflow-hidden border border-gray-200 w-full">
                    <div class="cursor-pointer bg-gray-50 hover:bg-gray-100 px-3 py-1.5 text-xs text-gray-600 font-medium flex items-center justify-between" onclick="toggleCollapse('${cid}')">
                        <span class="flex items-center gap-1.5">
                            <i class="fas ${statusIcon}"></i>
                            <span>工具: ${escapeHtml(toolName)}</span>
                            <span class="${statusClass} text-[10px] bg-white border border-gray-200 px-1 py-0.5 rounded">${statusLabel}</span>
                        </span>
                        <i class="fas fa-chevron-down text-gray-400 transition-transform duration-200" id="${cid}-icon"></i>
                    </div>
                    <div id="${cid}" class="hidden">
                        ${renderToolPart(toolPart)}
                    </div>
                </div>`;

            contentEl.scrollTop = contentEl.scrollHeight;
        }

        // 关闭弹窗时断开 SSE
        const originalHideModalFunc = hideModal;
        hideModal = function(id) {
            if (id === 'messagesModal' && eventSource) {
                eventSource.close();
                eventSource = null;
                console.log('SSE disconnected on modal close');
            }
            originalHideModalFunc(id);
        };

        // ---- 辅助函数：切换折叠 ----
        function toggleCollapse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (!el) return;
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                if (icon) icon.style.transform = 'rotate(180deg)';
            } else {
                el.classList.add('hidden');
                if (icon) icon.style.transform = 'rotate(0deg)';
            }
        }

        // ---- 辅助函数：检测并渲染 git diff ----
        function maybeRenderDiff(text) {
            if (!text || !text.includes('@@') || !text.includes('diff --git')) {
                return null;
            }
            return null; // 简化：让流式渲染回退到 marked.parse
        }

        // ---- 发送消息 ----
        async function sendMessage() {
            const inputEl = document.getElementById('messageInput');
            const btnEl = document.getElementById('sendMessageBtn');
            const statusEl = document.getElementById('sendStatus');
            const content = inputEl.value.trim();
            if (!content) return;
            if (!currentMessagesTaskId) {
                showToast('无法发送：未选择任务', 'error');
                return;
            }

            // ****** 发送新消息前处理旧流式状态 ******
            // 1. 关闭旧 SSE 连接
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                console.log('SSE closed before new message');
            }
            // 2. 将旧的未完成气泡标记为固定历史（不要删除！保留旧AI回复）
            const oldBubble = document.getElementById('streaming-bubble');
            if (oldBubble) {
                // 将所有未完成的 reasoning indicator 替换为"完成"
                oldBubble.querySelectorAll('.reasoning-indicator').forEach(indicator => {
                    indicator.innerHTML = '<i class="fas fa-check text-green-500 text-[10px]"></i><span class="text-green-500 text-[10px]">完成</span>';
                });
                // 移除 id，使其成为普通历史消息，不再被新消息操作影响
                oldBubble.removeAttribute('id');
                oldBubble.classList.add('ai-message-final');
                console.log('Old streaming bubble finalized (kept in DOM)');
            }
            // 3. 重置状态栏
            statusEl.textContent = '';
            statusEl.className = 'text-xs text-blue-500 ml-2';

            // 乐观更新：立即显示用户消息
            const contentEl = document.getElementById('messagesContent');
            const userHtml = `
                <div class="flex gap-3 justify-end mb-4">
                    <div class="max-w-[720px]">
                        <div class="flex items-center gap-2 mb-1 justify-end text-xs text-gray-400">
                            <span class="font-medium text-gray-600">你</span>
                        </div>
                        <div class="bg-white text-gray-800 border border-gray-200 rounded-2xl rounded-tr-sm px-4 py-3 text-sm shadow-sm">
                            <div class="markdown-body">${escapeHtml(maskSensitive(content))}</div>
                        </div>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white text-xs shadow-sm flex-shrink-0">
                        <i class="fas fa-user"></i>
                    </div>
                </div>`;
            contentEl.insertAdjacentHTML('beforeend', userHtml);
            inputEl.value = '';
            contentEl.scrollTop = contentEl.scrollHeight;

            btnEl.disabled = true;
            statusEl.textContent = '发送中...';

            try {
                const res = await apiFetch(`${API_BASE}/tasks/${currentMessagesTaskId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || '发送失败');
                }
                
                // 发送成功，立即重建 SSE 连接开始接收新回复
                statusEl.textContent = '';
                connectSSE(currentMessagesTaskId);
                
                btnEl.disabled = false;
            } catch (e) {
                statusEl.textContent = '发送失败: ' + e.message;
                statusEl.className = 'text-xs text-red-500 ml-2';
                btnEl.disabled = false;
            }
        }

        // ---- 键盘事件 ----
        function handleMessageKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // ---- 刷新消息列表（从 /messages 获取完整） ----
        async function refreshMessages() {
            if (!currentMessagesTaskId) return;
            try {
                const res = await apiFetch(`${API_BASE}/tasks/${currentMessagesTaskId}/messages`);
                if (!res.ok) return;
                const data = await res.json();
                const messages = data.data || [];
                if (messages.length > 0) {
                    renderMessages(messages);
                }
            } catch (e) {
                console.log('refreshMessages failed', e);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function openRetryModal(id) {
            let commentsHtml = '';
            let hasHistory = false;
            try {
                const res = await apiFetch(`${API_BASE}/tasks/${id}/review-comments`);
                const json = await res.json();
                const comments = (json.data || []).slice().reverse(); // 最新复核在前
                if (comments.length > 0) {
                    hasHistory = true;
                    // 默认全部折叠；默认全选所有历史复核意见
                    const expandThreshold = comments.length; // 全部折叠：没有任何 idx >= comments.length
                    const initialSelected = comments.length;
                    commentsHtml = '<div class="space-y-2 max-h-56 overflow-y-auto pr-1" id="historyComments">' +
                        '<div class="flex items-center justify-between mb-2">' +
                            '<div class="text-sm font-medium text-gray-700">历史复核意见（<span id="selectedCountDisplay">' + initialSelected + '</span>/' + comments.length + ' 已选）</div>' +
                            '<label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer select-none">' +
                                '<input type="checkbox" id="selectAllComments" checked class="w-3.5 h-3.5 rounded text-green-600 focus:ring-green-500" onchange="toggleSelectAllComments(this)"> 全选' +
                            '</label>' +
                        '</div>' +
                        comments.map((c, idx) => {
                            const isExpanded = idx >= expandThreshold;
                            const isLatest = idx === 0; // 反转后，索引 0 为最新
                            return `
                            <div class="bg-gray-50 rounded-lg border transition-all ${isLatest ? 'ring-1 ring-blue-200 border-blue-200' : ''}" data-comment-id="${c.id}">
                                <div class="flex items-center gap-2 px-3 py-2.5 cursor-pointer select-none" onclick="toggleHistoryComment(this)">
                                    <input type="checkbox" value="${c.id}" class="retry-checkbox w-4 h-4 text-green-600 rounded focus:ring-green-500 shrink-0" checked onclick="event.stopPropagation(); updateSelectedCount()">
                                    <span class="text-xs font-medium ${isLatest ? 'text-blue-700 bg-blue-50' : 'text-green-700 bg-green-50'} px-1.5 py-0.5 rounded shrink-0">第${c.retry_round}次复核${isLatest ? ' · 最新' : ''}</span>
                                    <span class="text-xs text-gray-400 shrink-0">${formatDate(c.created_at)}</span>
                                    <i class="fas fa-chevron-down ml-auto text-gray-400 text-xs transition-transform duration-200 ${isExpanded ? '' : '-rotate-90'}"></i>
                                </div>
                                <div class="text-sm text-gray-700 whitespace-pre-wrap px-3 pb-3 overflow-hidden transition-all duration-200 ${isExpanded ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}" style="line-height: 1.6;">${escapeHtml(c.content)}</div>
                            </div>`;
                        }).join('') +
                        '</div>';
                }
            } catch (e) {
                console.error('加载历史复核意见失败:', e);
            }

            const modal = document.createElement('div');
            modal.id = 'retryModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.dataset.taskId = id;
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] flex flex-col">
                    <div class="px-6 py-4 border-b flex items-center justify-between flex-shrink-0">
                        <h3 class="font-bold text-lg">补充意见并重新评审</h3>
                        <button onclick="document.getElementById('retryModal').remove()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="p-6 space-y-4 overflow-y-auto flex-1">
                        <!-- 编辑区置顶 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">${hasHistory ? '新增复核意见（可选）' : '补充复核意见'}</label>
                            <textarea id="retryComment" rows="5" maxlength="5000" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:outline-none resize-y" placeholder="请描述上次评审中不准确的地方，例如：\n1. 第32行的并发处理判断有误，应该用channel而非锁\n2. 第45行的空指针风险被遗漏了" oninput="updateRetryCharCount()"></textarea>
                            <div class="flex justify-between items-center mt-1">
                                <p class="text-xs text-gray-400">系统将勾选的复核意见 + 新的复核意见一起作为补充上下文发给大模型</p>
                                <span id="retryCharCount" class="text-xs text-gray-400">0 / 5000</span>
                            </div>
                        </div>
                        <!-- 历史复核意见 -->
                        ${commentsHtml}
                    </div>
                    <div class="px-6 py-4 border-t flex justify-end gap-3 flex-shrink-0">
                        <button onclick="document.getElementById('retryModal').remove()" class="px-4 py-2 border rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
                        <button onclick="submitRetryWithComment(${id})" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">确认重试</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            updateSelectedCount();
        }

        function toggleHistoryComment(headerEl) {
            const card = headerEl.parentElement;
            const contentDiv = card.querySelector('div:last-child');
            const icon = headerEl.querySelector('.fa-chevron-down');
            const isCollapsed = contentDiv.classList.contains('max-h-0');
            if (isCollapsed) {
                contentDiv.classList.remove('max-h-0', 'opacity-0');
                contentDiv.classList.add('max-h-96', 'opacity-100');
                icon.classList.remove('-rotate-90');
            } else {
                contentDiv.classList.remove('max-h-96', 'opacity-100');
                contentDiv.classList.add('max-h-0', 'opacity-0');
                icon.classList.add('-rotate-90');
            }
        }

        function toggleSelectAllComments(checkbox) {
            document.querySelectorAll('#historyComments .retry-checkbox').forEach(cb => {
                cb.checked = checkbox.checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const total = document.querySelectorAll('#historyComments .retry-checkbox').length;
            const selected = document.querySelectorAll('#historyComments .retry-checkbox:checked').length;
            const display = document.getElementById('selectedCountDisplay');
            if (display) display.textContent = selected;
            const selectAll = document.getElementById('selectAllComments');
            if (selectAll) {
                selectAll.checked = selected === total && total > 0;
                selectAll.indeterminate = selected > 0 && selected < total;
            }
        }

        function updateRetryCharCount() {
            const textarea = document.getElementById('retryComment');
            const countEl = document.getElementById('retryCharCount');
            if (!textarea || !countEl) return;
            const count = textarea.value.length;
            countEl.textContent = count + ' / 5000';
            if (count > 4800) {
                countEl.className = 'text-xs text-red-500';
            } else if (count > 4500) {
                countEl.className = 'text-xs text-orange-500';
            } else {
                countEl.className = 'text-xs text-gray-400';
            }
        }

        async function submitRetryWithComment(id) {
            const comment = document.getElementById('retryComment').value.trim();

            // 收集选中的历史复核意见ID
            const selectedIds = [];
            document.querySelectorAll('#historyComments .retry-checkbox:checked').forEach(cb => {
                selectedIds.push(parseInt(cb.value));
            });

            const hasNewComment = comment !== '';
            const hasSelectedHistory = selectedIds.length > 0;

            if (!hasNewComment && !hasSelectedHistory) {
                showToast('未添加复核意见，将直接重新评审', 'info');
            }

            try {
                const body = {};
                if (hasNewComment) body.user_review_comment = comment;
                if (hasSelectedHistory) body.selected_comment_ids = selectedIds;

                const res = await apiFetch(`${API_BASE}/tasks/${id}/retry`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('重试失败');
                showToast('任务已补充意见并重新触发', 'success');
                document.getElementById('retryModal')?.remove();
                loadTasks();
            } catch (e) {
                showToast('重试失败: ' + e.message, 'error');
            }
        }

        async function retryTask(id) {
            try {
                const res = await apiFetch(`${API_BASE}/tasks/${id}/retry`, { method: 'POST' });
                if (!res.ok) throw new Error('重试失败');
                showToast('任务已重新触发', 'success');
                loadTasks();
            } catch (e) {
                showToast('重试失败: ' + e.message, 'error');
            }
        }

        async function stopTask(id) {
            try {
                const res = await apiFetch(`${API_BASE}/tasks/${id}/stop`, { method: 'POST' });
                if (!res.ok) throw new Error('停止失败');
                showToast('任务已停止', 'success');
                loadTasks();
            } catch (e) {
                showToast('停止失败: ' + e.message, 'error');
            }
        }

        async function deleteTaskSession(id) {
            if (!confirm('确定删除此任务的 OpenCode session 吗？对话记录将不可恢复。')) return;

            try {
                const res = await apiFetch(`${API_BASE}/tasks/${id}/session`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || '删除失败');
                }
                showToast('Session 已删除', 'success');
                loadTasks();
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }

        // ================== 结构化评审相关函数 ==================
        let currentStructuredReview = null;
        let currentTaskId = null;
        let issueFilter = 'all';

        function switchReviewTab(tab) {
            document.querySelectorAll('.review-tab').forEach(btn => {
                btn.classList.remove('active', 'border-blue-500', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            document.querySelectorAll('.review-panel').forEach(panel => panel.classList.add('hidden'));
            
            if (tab === 'structured') {
                document.getElementById('tabStructured').classList.add('active', 'border-blue-500', 'text-blue-600');
                document.getElementById('tabStructured').classList.remove('border-transparent', 'text-gray-500');
                document.getElementById('structuredReviewPanel').classList.remove('hidden');
            } else {
                document.getElementById('tabRaw').classList.add('active', 'border-blue-500', 'text-blue-600');
                document.getElementById('tabRaw').classList.remove('border-transparent', 'text-gray-500');
                document.getElementById('rawReviewPanel').classList.remove('hidden');
            }
        }

        async function loadStructuredReview(taskId) {
            try {
                const res = await apiFetch(`${API_BASE}/tasks/${taskId}/structured-review`);
                const data = await res.json();
                if (data.code === 0 && data.data) {
                    currentStructuredReview = data.data;
                    currentTaskId = taskId;
                    renderStructuredReview();
                }
            } catch (err) {
                console.warn('结构化评审加载失败:', err);
            }
        }

        function renderStructuredReview() {
            const data = currentStructuredReview;
            if (!data) return;

            // 总分
            document.getElementById('structuredTotalScore').textContent = data.total_score || '-';
            
            // 维度评分条
            const dimContainer = document.getElementById('dimensionBars');
            if (data.dimension_scores && data.dimension_scores !== '{}') {
                document.getElementById('dimensionScoresArea').classList.remove('hidden');
                try {
                    const dims = typeof data.dimension_scores === 'string' ? JSON.parse(data.dimension_scores) : data.dimension_scores;
                    const dimLabels = { security: '安全性', code_quality: '代码质量', readability: '可读性', maintainability: '可维护性', test_coverage: '测试覆盖' };
                    dimContainer.innerHTML = Object.entries(dims).map(([key, val]) => {
                        const score = typeof val === 'object' ? val.score : val;
                        const label = dimLabels[key] || key;
                        const color = score >= 80 ? 'bg-green-500' : score >= 60 ? 'bg-yellow-500' : 'bg-red-500';
                        return `
                            <div class="text-center">
                                <div class="text-xs font-bold ${score >= 60 ? 'text-gray-700' : 'text-red-600'}">${score}</div>
                                <div class="h-8 bg-gray-200 rounded-full overflow-hidden relative mt-1">
                                    <div class="${color} absolute bottom-0 left-0 right-0 rounded-full" style="height:${score}%"></div>
                                </div>
                                <div class="text-[10px] text-gray-500 mt-0.5">${label}</div>
                            </div>
                        `;
                    }).join('');
                } catch (e) {
                    dimContainer.innerHTML = '';
                }
            } else {
                document.getElementById('dimensionScoresArea').classList.add('hidden');
            }

            // 文件筛选下拉框
            const fileSelect = document.getElementById('issueFileFilter');
            if (data.issues && data.issues.length > 0) {
                const files = [...new Set(data.issues.map(i => i.file).filter(f => f))];
                fileSelect.innerHTML = '<option value="">所有文件</option>' + 
                    files.map(f => `<option value="${f}">${f}</option>`).join('');
            }

            renderIssues();
        }

        function renderIssues() {
            const data = currentStructuredReview;
            if (!data || !data.issues) {
                document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-gray-400 py-8">暂无问题</div>';
                return;
            }

            const fileFilter = document.getElementById('issueFileFilter').value;
            let issues = data.issues;

            // 按状态筛选
            if (issueFilter !== 'all') {
                issues = issues.filter(i => i.status === issueFilter);
            }
            // 按文件筛选
            if (fileFilter) {
                issues = issues.filter(i => i.file === fileFilter);
            }

            if (issues.length === 0) {
                document.getElementById('issuesListArea').innerHTML = '<div class="text-center text-gray-400 py-8">没有符合条件的问题</div>';
                return;
            }

            const severityColors = { critical: 'border-red-500 bg-red-50', high: 'border-orange-500 bg-orange-50', medium: 'border-yellow-500 bg-yellow-50', low: 'border-blue-500 bg-blue-50', info: 'border-gray-400 bg-gray-50' };
            const severityLabels = { critical: '严重', high: '高危', medium: '中危', low: '低危', info: '提示' };
            const statusLabels = { pending: '待处理', accepted: '已采纳', rejected: '已拒绝' };
            const statusColors = { pending: 'text-gray-500', accepted: 'text-green-600', rejected: 'text-red-600' };

            document.getElementById('issuesListArea').innerHTML = issues.map(issue => `
                <div class="border-l-4 rounded-lg p-3 ${severityColors[issue.severity] || 'border-gray-300 bg-gray-50'}">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <input type="checkbox" class="issue-checkbox rounded" value="${issue.id}" onchange="updateBatchActionBar()">
                                <span class="text-xs font-medium px-1.5 py-0.5 rounded ${issue.severity === 'critical' ? 'bg-red-100 text-red-700' : issue.severity === 'high' ? 'bg-orange-100 text-orange-700' : 'bg-gray-100 text-gray-600'}">${severityLabels[issue.severity] || issue.severity}</span>
                                <span class="text-xs text-gray-500">${issue.rule_code || '自定义'}</span>
                                <span class="text-xs ${statusColors[issue.status] || 'text-gray-500'}">[${statusLabels[issue.status] || issue.status}]</span>
                            </div>
                            <p class="text-sm font-medium text-gray-800">${issue.message}</p>
                            ${issue.file ? `<p class="text-xs text-gray-500 mt-0.5"><i class="fas fa-file-code mr-1"></i>${issue.file}${issue.line_start > 0 ? ' (第' + issue.line_start + '行)' : ''}</p>` : ''}
                            ${issue.code_snippet ? `<pre class="text-xs bg-gray-800 text-gray-100 p-2 rounded mt-1 overflow-x-auto">${issue.code_snippet}</pre>` : ''}
                            ${issue.suggestion ? `<p class="text-xs text-gray-600 mt-1"><i class="fas fa-lightbulb mr-1 text-yellow-500"></i>${issue.suggestion}</p>` : ''}
                            ${issue.reject_reason ? `<p class="text-xs text-red-500 mt-1"><i class="fas fa-info-circle mr-1"></i>拒绝原因：${issue.reject_reason}</p>` : ''}
                        </div>
                        <div class="flex gap-1 ml-2 ${issue.status === 'pending' ? '' : 'hidden'}">
                            <button onclick="resolveIssue(${issue.id}, 'accepted')" class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200" title="采纳"><i class="fas fa-check"></i></button>
                            <button onclick="showRejectInput(${issue.id})" class="text-xs px-2 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200" title="拒绝"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div id="rejectInput-${issue.id}" class="hidden mt-2">
                        <input type="text" placeholder="填写拒绝原因..." class="text-xs px-2 py-1 border rounded w-full mb-1" id="rejectReason-${issue.id}">
                        <div class="flex gap-1">
                            <button onclick="resolveIssue(${issue.id}, 'rejected', document.getElementById('rejectReason-${issue.id}').value)" class="text-xs px-2 py-1 bg-red-600 text-white rounded">确认拒绝</button>
                            <button onclick="hideRejectInput(${issue.id})" class="text-xs px-2 py-1 bg-gray-200 text-gray-600 rounded">取消</button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateBatchActionBar();
        }

        function filterIssues(filter) {
            issueFilter = filter;
            document.querySelectorAll('.issue-filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active', 'bg-blue-100', 'text-blue-700');
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                } else {
                    btn.classList.remove('active', 'bg-blue-100', 'text-blue-700');
                    btn.classList.add('bg-gray-100', 'text-gray-600');
                }
            });
            renderIssues();
        }

        function showRejectInput(issueId) {
            document.getElementById(`rejectInput-${issueId}`).classList.remove('hidden');
        }

        function hideRejectInput(issueId) {
            document.getElementById(`rejectInput-${issueId}`).classList.add('hidden');
        }

        async function resolveIssue(issueId, status, rejectReason) {
            try {
                const res = await apiFetch(`${API_BASE}/tasks/review-issues/batch-resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        issues: [{ id: issueId, status: status, reject_reason: rejectReason || '' }]
                    })
                });
                if (!res.ok) throw new Error('操作失败');
                showToast(status === 'accepted' ? '已采纳' : '已拒绝', 'success');
                // 刷新
                loadStructuredReview(currentTaskId);
            } catch (err) {
                showToast('操作失败: ' + err.message, 'error');
            }
        }

        function updateBatchActionBar() {
            const checked = document.querySelectorAll('.issue-checkbox:checked');
            const bar = document.getElementById('batchActionBar');
            document.getElementById('selectedIssueCount').textContent = checked.length;
            bar.classList.toggle('hidden', checked.length === 0);
        }

        async function batchAcceptIssues() {
            const checked = document.querySelectorAll('.issue-checkbox:checked');
            const issues = Array.from(checked).map(cb => ({ id: parseInt(cb.value), status: 'accepted' }));
            await batchResolve(issues, '批量采纳成功');
        }

        async function batchRejectIssues() {
            const reason = prompt('请输入批量拒绝的原因（可留空）：');
            if (reason === null) return;
            const checked = document.querySelectorAll('.issue-checkbox:checked');
            const issues = Array.from(checked).map(cb => ({ id: parseInt(cb.value), status: 'rejected', reject_reason: reason }));
            await batchResolve(issues, '批量拒绝成功');
        }

        async function batchResolve(issues, successMsg) {
            try {
                const res = await apiFetch(`${API_BASE}/tasks/review-issues/batch-resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ issues })
                });
                if (!res.ok) throw new Error('操作失败');
                showToast(successMsg, 'success');
                loadStructuredReview(currentTaskId);
            } catch (err) {
                showToast('操作失败: ' + err.message, 'error');
            }
        }

        function maskSensitive(text) {
            if (!text || typeof text !== 'string') return text;
            return text
                // GitLab OAuth2: oauth2:glpat-xxx@host → oauth2:****@host
                .replace(/(oauth2:)[^@]+(@)/g, '$1****$2')
                // GitLab personal access tokens: glpat-xxx → glpat-****
                .replace(/(glpat-)[a-zA-Z0-9_-]+/gi, '$1****')
                // URL Basic Auth: https://user:password@host → https://user:****@host
                .replace(/([a-zA-Z0-9_-]+:)[a-zA-Z0-9_-]+(@[a-zA-Z0-9._:-]+)/g, '$1****$2')
                // Bearer token headers
                .replace(/(Bearer\s+)[a-zA-Z0-9_.-]{10,}/gi, '$1****')
                // SK keys: sk-xxx → sk-****
                .replace(/(\bsk-)[a-zA-Z0-9]{20,}/g, '$1****')
                // API key patterns
                .replace(/(api[_-]?key\s*[:=]\s*)\S+/gi, '$1****')
                // Password patterns
                .replace(/(password\s*[:=]\s*)\S+/gi, '$1****')
                .replace(/(passwd\s*[:=]\s*)\S+/gi, '$1****')
                // Secret patterns
                .replace(/(secret\s*[:=]\s*)\S+/gi, '$1****');
        }

        function showToast(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 ${colors[type] || colors.info} text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function filterTasks() {
            currentPage = 1;
            loadTasks();
        }

        function refreshTasks() {
            currentPage = 1;
            loadTasks();
            loadStats();
        }

        loadProjectFilter(); // 先加载项目列表到筛选下拉框
        loadTasks();
        loadStats();
        renderSidebar('tasks');
        // 普通用户：作者筛选框只显示自己（数据已由后端过滤）
        if (isUser()) {
            restrictAuthorFilterToSelf();
        }
    </script>
    <script defer src="/static/js/tailwindcss.min.js"></script>
</body>
</html>
